<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cockpit-Trader — Orders</title>
<style>
:root{
  --bg:#0a0e17;--card:#111827;--border:#1e2a3a;--text:#e2e8f0;
  --muted:#64748b;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --blue:#3b82f6;--cyan:#06b6d4;--white:#f1f5f9;--dim:#30363d;--magenta:#d946ef;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:clamp(13px,1.1vw,16px)}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;padding:20px;min-height:100vh;}

/* ── Shared Header ────────────────────────────────────────────────── */
.site-header{text-align:center;padding:20px 0 24px;border-bottom:1px solid var(--border);margin-bottom:0;}
.site-header h1{font-size:28px;letter-spacing:4px;text-transform:uppercase;
  background:linear-gradient(90deg,var(--cyan),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.site-header .ts{color:var(--muted);font-size:13px;margin-top:8px;}
.site-nav{display:flex;justify-content:center;gap:8px;padding:12px 0 20px;
  border-bottom:1px solid var(--border);margin-bottom:24px;}
.site-nav a{color:var(--muted);text-decoration:none;padding:8px 20px;font-size:13px;
  border-radius:8px;border:1px solid var(--border);letter-spacing:1px;transition:all .2s;}
.site-nav a.active{color:var(--text);background:rgba(59,130,246,0.15);border-color:var(--blue);}
.site-nav a:hover{color:var(--text);border-color:var(--muted);}
#age-bar{margin-top:6px;font-size:12px;}

/* ── Card Zeitstempel ─────────────────────────────────────────────── */
.ct{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px;
  font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;}
.ct-left{display:flex;align-items:center;gap:8px;}
.ct-ts{font-size:10px;color:var(--muted);letter-spacing:0;text-transform:none;opacity:0.7;white-space:nowrap;}

/* ── Layout ───────────────────────────────────────────────────────── */
main{max-width:1400px;margin:0 auto;}

/* ── Stats Bar ────────────────────────────────────────────────────── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat{text-align:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.stat-value{font-size:22px;font-weight:700;margin-top:4px;}

/* ── Card ─────────────────────────────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}

/* ── Table ────────────────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:rgba(255,255,255,.03);border-bottom:2px solid var(--border);}
thead th{padding:10px 12px;text-align:left;font-size:9px;text-transform:uppercase;
  letter-spacing:1px;color:var(--muted);font-weight:700;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody tr.top-pick{border-left:3px solid var(--cyan);}
td{padding:10px 12px;vertical-align:middle;white-space:nowrap;}

/* Column styles */
.td-inst{font-weight:700;font-size:13px;}
.td-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  padding:3px 8px;border-radius:10px;display:inline-block;}
.type-buy{background:rgba(34,197,94,.1);color:var(--green);}
.type-sell{background:rgba(239,68,68,.1);color:var(--red);}
.td-price{font-weight:600;font-size:13px;}
.td-sl{color:var(--red);}
.td-tp{color:var(--green);}
.td-rr{font-weight:700;color:var(--cyan);}
.td-conf{font-size:11px;color:var(--muted);max-width:220px;white-space:normal;line-height:1.4;}

/* P% bar */
.pct-cell{display:flex;align-items:center;gap:6px;}
.pct-bar-bg{width:44px;height:5px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;flex-shrink:0;}
.pct-bar{height:5px;border-radius:4px;}

/* ── Empty ────────────────────────────────────────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty h3{font-size:14px;margin-bottom:8px;}

footer{text-align:center;padding:20px;font-size:10px;color:var(--muted);
  border-top:1px solid var(--border);margin-top:16px;}

@media(max-width:768px){
  body{padding:12px;}
  .site-nav a{padding:6px 12px;font-size:12px;}
  .stats-bar{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:1200px){
  thead th{font-size:10px;padding:12px 14px;}
  td{font-size:13px;padding:12px 14px;}
  .td-inst{font-size:15px;}
  .td-type{font-size:11px;padding:4px 10px;}
  .td-price{font-size:14px;}
  .td-conf{font-size:12px;}
  .pct-bar-bg{width:56px;}
}
</style>
</head>
<body>

<div class="site-header">
  <h1>✈ Cockpit-Trader</h1>
  <div class="ts" id="ts">Lade Daten...</div>
  <div id="age-bar" style="display:none">
    <span id="age-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;"></span>
    <span id="age-txt"></span>
  </div>
</div>

<div class="site-nav">
  <a href="index.html">Dashboard</a>
  <a href="index.html#backtest" onclick="sessionStorage.setItem('tab','backtest')">Backtest</a>
  <a href="journal.html">Journal</a>
  <a href="orders.html" class="active">Orders</a>
</div>

<main>
  <div id="stats-bar" class="stats-bar" style="display:none">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Long</div><div class="stat-value" style="color:var(--green)" id="s-long">0</div></div>
    <div class="stat"><div class="stat-label">Short</div><div class="stat-value" style="color:var(--red)" id="s-short">0</div></div>
    <div class="stat"><div class="stat-label">Ø R:R</div><div class="stat-value" style="color:var(--cyan)" id="s-rr">—</div></div>
  </div>
  <div id="content">
    <div class="empty"><h3>Lade Orders...</h3></div>
  </div>
</main>

<footer>The Trading Floor · Cockpit Trader · Auction Market Theory</footer>

<script>
var _analysisTs = null;

function fmtTs(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d)) return '';
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' Uhr';
}

function fmtAge(ts) {
  const mins = Math.floor((Date.now() - ts.getTime()) / 60000);
  if (mins < 1)  return {txt:'gerade aktualisiert',    color:'#22c55e'};
  if (mins < 60) return {txt:'vor '+mins+' Min',        color:'#22c55e'};
  const h = Math.floor(mins/60), m = mins%60;
  if (h < 4)  return {txt:'vor '+h+'h '+m+'min',           color:'#eab308'};
  if (h < 8)  return {txt:'vor '+h+'h — bitte neu starten', color:'#f97316'};
  return           {txt:h+'h alt — VERALTET',                color:'#ef4444'};
}

function updateAge() {
  if (!_analysisTs) return;
  const {txt, color} = fmtAge(_analysisTs);
  document.getElementById('age-txt').textContent = txt;
  document.getElementById('age-txt').style.color = color;
  document.getElementById('age-dot').style.background = color;
  document.getElementById('age-dot').style.boxShadow = '0 0 6px ' + color;
}

function ct(icon, label, ts) {
  const tsHtml = ts ? `<span class="ct-ts">Stand: ${fmtTs(ts)}</span>` : '';
  return `<div class="ct"><span class="ct-left">${icon} ${label}</span>${tsHtml}</div>`;
}

async function loadOrders() {
  try {
    const res = await fetch('journal-data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    const ts = d.timestamp || null;

    if (ts) {
      _analysisTs = new Date(ts);
      document.getElementById('ts').textContent =
        'Limit Orders — ' + _analysisTs.toLocaleDateString('de-DE') + ' ' +
        _analysisTs.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' Uhr';
      document.title = 'Cockpit-Trader — Orders ' + _analysisTs.toLocaleDateString('de-DE');
      document.getElementById('age-bar').style.display = 'block';
      updateAge();
      setInterval(updateAge, 60000);
    }

    // Alle Orders sammeln
    let all = [];
    (d.instruments || []).forEach(inst => {
      (inst.orders || []).forEach(o => {
        all.push({...o, instrument: inst.name, bias: inst.bias});
      });
    });

    all.sort((a, b) => parseFloat(b.p_fill||0) - parseFloat(a.p_fill||0));

    if (!all.length) {
      document.getElementById('content').innerHTML =
        '<div class="empty"><h3>Keine Orders für heute</h3><p>Kein Setup mit ausreichender Konfluenz.</p></div>';
      return;
    }

    // Stats
    const longs  = all.filter(o => (o.type||'').toLowerCase().includes('buy')).length;
    const shorts = all.length - longs;
    const avgRR  = (all.reduce((s,o) => s + (parseFloat(o.rr)||0), 0) / all.length).toFixed(1);
    document.getElementById('stats-bar').style.display = 'grid';
    document.getElementById('s-total').textContent = all.length;
    document.getElementById('s-long').textContent  = longs;
    document.getElementById('s-short').textContent = shorts;
    document.getElementById('s-rr').textContent    = avgRR;

    // Tabelle
    const rows = all.map((o, i) => {
      const isBuy   = (o.type||'').toLowerCase().includes('buy');
      const typeCls = isBuy ? 'type-buy' : 'type-sell';
      const pFill   = parseFloat(o.p_fill) || 0;
      const pTp1    = parseFloat(o.p_tp1)  || 0;
      const fillCol = pFill >= 60 ? 'var(--green)' : pFill >= 40 ? 'var(--yellow)' : 'var(--muted)';
      const tp1Col  = pTp1  >= 60 ? 'var(--green)' : pTp1  >= 40 ? 'var(--yellow)' : 'var(--muted)';
      return `<tr class="${i===0?'top-pick':''}">
        <td class="td-inst">${o.instrument||'—'}${i===0?' ⭐':''}</td>
        <td><span class="td-type ${typeCls}">${o.type||'—'}</span></td>
        <td class="td-price">${o.entry||'—'}</td>
        <td class="td-price td-sl">${o.sl||'—'}</td>
        <td class="td-price td-tp">${o.tp1||'—'}</td>
        <td class="td-price td-tp">${o.tp2||'—'}</td>
        <td class="td-rr">${o.rr||'—'}</td>
        <td><div class="pct-cell">
          <div class="pct-bar-bg"><div class="pct-bar" style="width:${pFill}%;background:${fillCol}"></div></div>
          <span style="color:${fillCol};font-weight:600">${pFill}%</span>
        </div></td>
        <td><div class="pct-cell">
          <div class="pct-bar-bg"><div class="pct-bar" style="width:${pTp1}%;background:${tp1Col}"></div></div>
          <span style="color:${tp1Col};font-weight:600">${pTp1}%</span>
        </div></td>
        <td class="td-conf">${o.confluence||'—'}</td>
      </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      <div class="card">
        ${ct('📋', 'Limit Orders — Heute', ts)}
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Instrument</th><th>Typ</th><th>Entry</th>
              <th>SL</th><th>TP1</th><th>TP2</th><th>R:R</th>
              <th>P_Fill%</th><th>P_TP1%</th><th>Konfluenz</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;

  } catch(err) {
    document.getElementById('content').innerHTML =
      `<div class="empty"><h3>Fehler beim Laden</h3><p>${err.message}</p></div>`;
  }
}

loadOrders();
</script>
</body>
</html>
