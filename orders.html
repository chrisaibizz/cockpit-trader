<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cockpit-Trader — Orders</title>
<style>
:root{--bg:#0a0e17;--card:#111827;--border:#1e2a3a;--text:#e2e8f0;--muted:#64748b;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--cyan:#06b6d4;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;padding:20px;min-height:100vh;}
.header{text-align:center;padding:20px 0 14px;border-bottom:1px solid var(--border);}
.header h1{font-size:22px;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header .ts{color:var(--muted);font-size:12px;margin-top:5px;}
#age-bar{margin-top:4px;font-size:11px;display:none;}
.nav{display:flex;justify-content:center;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);}
.nav a{color:var(--muted);text-decoration:none;padding:6px 16px;font-size:12px;border-radius:6px;border:1px solid var(--border);letter-spacing:1px;transition:all .2s;}
.nav a.active{color:var(--text);background:rgba(59,130,246,0.15);border-color:var(--blue);}
.nav a:hover{color:var(--text);border-color:var(--muted);}
main{max-width:1400px;margin:0 auto;padding:20px;}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.stat{text-align:center;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;}
.stat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.stat-val{font-size:22px;font-weight:700;margin-top:4px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px;}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.card-ts{font-size:10px;color:var(--muted);}
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{background:rgba(255,255,255,.03);border-bottom:2px solid var(--border);}
thead th{padding:10px 12px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,.02);}
tbody tr.top-pick{border-left:3px solid var(--cyan);}
td{padding:10px 12px;vertical-align:middle;white-space:nowrap;}
.td-inst{font-weight:700;font-size:13px;}
.td-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:10px;display:inline-block;}
.type-buy{background:rgba(34,197,94,.1);color:var(--green);}
.type-sell{background:rgba(239,68,68,.1);color:var(--red);}
.td-price{font-weight:600;font-size:13px;}
.td-sl{color:var(--red);}
.td-tp{color:var(--green);}
.td-rr{font-weight:700;color:var(--cyan);}
.td-conf{font-size:11px;color:var(--muted);max-width:220px;white-space:normal;line-height:1.4;}
.pct-cell{display:flex;align-items:center;gap:6px;}
.pct-bar-bg{width:44px;height:5px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;flex-shrink:0;}
.pct-bar{height:5px;border-radius:4px;}
.warn{font-size:11px;color:var(--yellow);padding:2px 0;}
.notes{font-size:11px;color:var(--muted);margin-top:6px;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
footer{text-align:center;padding:20px;font-size:10px;color:var(--muted);border-top:1px solid var(--border);margin-top:8px;}
@media(max-width:768px){.stats-bar{grid-template-columns:repeat(2,1fr);}main{padding:12px;}}
</style>
</head>
<body>
<div class="header">
  <h1>&#x2708; Cockpit-Trader</h1>
  <div class="ts" id="ts">Lade Orders...</div>
  <div id="age-bar">
    <span id="age-dot" style="display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle;"></span>
    <span id="age-txt"></span>
  </div>
</div>
<div class="nav">
  <a href="index.html">Dashboard</a>
  <a href="journal.html">Journal</a>
  <a href="indicators.html">Indicators</a>
  <a href="orders.html" class="active">Orders</a>
  <a href="index.html" onclick="sessionStorage.setItem('tab','backtest')">Backtest</a>
  <a href="wiki.html">Wiki</a>
</div>
<main>
  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat"><div class="stat-lbl">Total</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-lbl">Long</div><div class="stat-val" style="color:var(--green)" id="s-long">0</div></div>
    <div class="stat"><div class="stat-lbl">Short</div><div class="stat-val" style="color:var(--red)" id="s-short">0</div></div>
    <div class="stat"><div class="stat-lbl">&#216; R:R</div><div class="stat-val" style="color:var(--cyan)" id="s-rr">&#8212;</div></div>
  </div>
  <div id="content"><div class="empty"><h3>Lade Orders...</h3></div></div>
</main>
<footer>The Trading Floor &middot; Cockpit Trader &middot; Auction Market Theory</footer>
<script>
var _ts = null;

function fmtTs(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  if (isNaN(d)) return '';
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' Uhr';
}

function fmtAge(ts) {
  var m = Math.floor((Date.now() - ts.getTime()) / 60000);
  if (m < 1)  return {t:'gerade aktualisiert', c:'#22c55e'};
  if (m < 60) return {t:'vor ' + m + ' Min', c:'#22c55e'};
  var h = Math.floor(m/60), mm = m%60;
  if (h < 4) return {t:'vor ' + h + 'h ' + mm + 'min', c:'#eab308'};
  if (h < 8) return {t:'vor ' + h + 'h \u2014 bitte neu starten', c:'#f97316'};
  return {t:h + 'h alt \u2014 VERALTET', c:'#ef4444'};
}

function updateAge() {
  if (!_ts) return;
  var a = fmtAge(_ts);
  document.getElementById('age-txt').textContent = a.t;
  document.getElementById('age-txt').style.color = a.c;
  document.getElementById('age-dot').style.background = a.c;
  document.getElementById('age-dot').style.boxShadow = '0 0 6px ' + a.c;
}

function pctBar(pct) {
  var col = pct >= 60 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--muted)';
  return '<div class="pct-cell">' +
    '<div class="pct-bar-bg"><div class="pct-bar" style="width:' + pct + '%;background:' + col + '"></div></div>' +
    '<span style="color:' + col + ';font-weight:600">' + pct + '%</span></div>';
}

function render(d) {
  var ts = d.pipeline && d.pipeline.started || null;
  if (ts) {
    _ts = new Date(ts);
    document.getElementById('ts').textContent = 'Limit Orders \u2014 ' +
      _ts.toLocaleDateString('de-DE') + ' ' +
      _ts.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) + ' Uhr';
    document.getElementById('age-bar').style.display = 'block';
    updateAge();
    setInterval(updateAge, 60000);
  }

  var rawOrders = d.orders && d.orders.orders || [];
  var summary = d.orders && d.orders.summary || {};

  if (!rawOrders.length) {
    document.getElementById('content').innerHTML =
      '<div class="empty"><h3>Keine Orders f\u00fcr heute</h3><p>Kein Setup mit ausreichender Konfluenz.</p></div>';
    return;
  }

  // Map to display format
  var all = rawOrders.map(function(o) {
    return {
      instrument: o.instrument || '—',
      type: o.richtung === 'LONG' ? 'Limit Buy' : 'Limit Sell',
      entry: o.entry,
      sl: o.sl,
      tp1: o.tp1,
      tp2: o.tp2,
      rr: o.rr,
      p_fill: o.p_fill || 0,
      p_tp1: o.p_tp1 || 0,
      score: o.konfluenz_score || 0,
      confluence: (o.bestaedigungen || []).join(' + ')
    };
  });

  // Sort by p_fill desc
  all.sort(function(a,b){ return b.p_fill - a.p_fill; });

  // Stats
  var longs = all.filter(function(o){ return o.type.includes('Buy'); }).length;
  var avgRR = (all.reduce(function(s,o){ return s + (o.rr||0); }, 0) / all.length).toFixed(1);
  document.getElementById('stats-bar').style.display = 'grid';
  document.getElementById('s-total').textContent = all.length;
  document.getElementById('s-long').textContent = longs;
  document.getElementById('s-short').textContent = all.length - longs;
  document.getElementById('s-rr').textContent = avgRR;

  // Rows
  var rows = all.map(function(o, i) {
    var isBuy = o.type.includes('Buy');
    var f = function(v) { return v != null ? Number(v).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'; };
    return '<tr class="' + (i===0?'top-pick':'') + '">' +
      '<td class="td-inst">' + o.instrument + (i===0?' &#11088;':'') + '</td>' +
      '<td><span class="td-type ' + (isBuy?'type-buy':'type-sell') + '">' + o.type + '</span></td>' +
      '<td class="td-price">' + f(o.entry) + '</td>' +
      '<td class="td-price td-sl">' + f(o.sl) + '</td>' +
      '<td class="td-price td-tp">' + f(o.tp1) + '</td>' +
      '<td class="td-price td-tp">' + f(o.tp2) + '</td>' +
      '<td class="td-rr">' + (o.rr||'—') + '</td>' +
      '<td>' + pctBar(o.p_fill) + '</td>' +
      '<td>' + pctBar(o.p_tp1) + '</td>' +
      '<td><span style="font-size:11px;color:var(--cyan);font-weight:700">' + o.score + '/10</span></td>' +
      '<td class="td-conf">' + o.confluence + '</td>' +
    '</tr>';
  }).join('');

  var tsStr = ts ? 'Stand: ' + fmtTs(ts) : '';
  var warnsHtml = (summary.warnings||[]).map(function(w){
    return '<div class="warn">\u26a0 ' + w + '</div>';
  }).join('');
  var notesHtml = summary.notes ? '<div class="notes">' + summary.notes + '</div>' : '';

  document.getElementById('content').innerHTML =
    '<div class="card">' +
      '<div class="card-header"><span class="card-title">&#128203; Limit Orders \u2014 Heute</span><span class="card-ts">' + tsStr + '</span></div>' +
      '<div class="table-wrap">' +
        '<table>' +
          '<thead><tr>' +
            '<th>Instrument</th><th>Typ</th><th>Entry</th>' +
            '<th>SL</th><th>TP1</th><th>TP2</th><th>R:R</th>' +
            '<th>P_Fill%</th><th>P_TP1%</th><th>Score</th><th>Konfluenz</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
      '</div>' +
      (warnsHtml ? '<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">' + warnsHtml + '</div>' : '') +
      notesHtml +
    '</div>';
}

function load() {
  // fetch state.json zuerst (GitHub Pages - immer aktuell)
  fetch('state.json?t=' + Date.now())
    .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(render)
    .catch(function(e){
      // Fallback: eingebettete Daten (lokal)
      if(window.__STATE_DATA__){ render(window.__STATE_DATA__); return; }
      document.getElementById('content').innerHTML =
        '<div class="empty"><h3>Fehler beim Laden</h3><p>' + e.message + '</p></div>';
    });
}

load();
</script>
</body>
</html>
