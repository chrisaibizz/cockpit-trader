<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Trading Floor — Orders</title>
<style>
:root{--bg:#0a0e17;--card:#111827;--border:#1e2a3a;--text:#e2e8f0;--muted:#64748b;--dim:#374151;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--cyan:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:0;min-height:100vh;font-size:14px}
nav{position:sticky;top:0;z-index:100;background:rgba(10,14,23,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-weight:800;font-size:13px;letter-spacing:1px;color:var(--text)}
.nav-brand span{color:var(--blue)}
.nav-links{display:flex;gap:2px}
.nav-links a{color:var(--muted);text-decoration:none;padding:6px 10px;font-size:11px;font-weight:600;border-radius:6px;letter-spacing:0.5px}
.nav-links a.active{color:var(--blue);background:rgba(59,130,246,0.1)}
main{padding:16px;max-width:600px;margin:0 auto}
.page-title{font-size:18px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:11px;color:var(--muted);margin-bottom:16px}
.ts{font-size:10px;color:var(--dim);margin-bottom:12px;font-family:monospace}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.stat{text-align:center;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 4px}
.stat-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px}
.stat-value{font-size:18px;font-weight:800;font-family:monospace;margin-top:2px}

/* Order card */
.order{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;transition:border-color 0.2s}
.order:first-of-type{border-color:var(--cyan)}
.order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.order-inst{font-size:15px;font-weight:700}
.order-type{font-size:12px;font-weight:700;padding:3px 8px;border-radius:4px}
.type-buy{background:rgba(34,197,94,0.12);color:var(--green)}
.type-sell{background:rgba(239,68,68,0.12);color:var(--red)}

/* Price grid */
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.pg{text-align:center;background:rgba(255,255,255,0.02);border-radius:6px;padding:6px}
.pg-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px}
.pg-value{font-size:14px;font-weight:700;font-family:monospace;margin-top:2px}

/* Probability */
.prob-section{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.prob-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prob-label{font-size:10px;color:var(--dim);min-width:36px;text-transform:uppercase}
.prob-bar{flex:1;height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
.prob-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
.prob-pct{font-size:12px;font-weight:700;font-family:monospace;min-width:32px;text-align:right}
.rr-badge{display:flex;align-items:center;gap:6px}
.rr-label{font-size:10px;color:var(--dim)}
.rr-value{font-size:14px;font-weight:800;color:var(--cyan);font-family:monospace}

/* Confluence */
.conf{font-size:11px;color:var(--muted);line-height:1.5}
.conf-dots{color:var(--yellow);letter-spacing:3px;font-size:12px;margin-right:6px}
.conf-tf{font-size:10px;color:var(--dim);margin-top:4px}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty h3{color:var(--muted);font-size:14px;margin-bottom:8px}
.empty p{font-size:12px;line-height:1.6}
footer{text-align:center;padding:20px;font-size:10px;color:var(--dim);border-top:1px solid var(--border)}
</style>
</head>
<body>
<div class="header">
  <h1>✈ Cockpit-Trader</h1>
  <div class="ts" id="ts">Lade Daten...</div>
  <div id="age-bar" style="margin-top:6px;font-size:12px;display:none;">
    <span id="age-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle;"></span>
    <span id="age-txt"></span>
  </div>
</div>
<div style="display:flex;justify-content:center;gap:8px;padding:12px 0 20px;border-bottom:1px solid #1e2a3a;margin-bottom:30px;">
  <a href="index.html" style="color:#64748b;text-decoration:none;padding:8px 20px;font-size:13px;font-family:'SF Mono','Fira Code',monospace;border-radius:8px;border:1px solid #1e2a3a;letter-spacing:1px;">Dashboard</a>
  <a href="journal.html" style="color:#64748b;text-decoration:none;padding:8px 20px;font-size:13px;font-family:'SF Mono','Fira Code',monospace;border-radius:8px;border:1px solid #1e2a3a;letter-spacing:1px;">Journal</a>
  <a href="orders.html" style="color:#e2e8f0;text-decoration:none;padding:8px 20px;font-size:13px;font-family:'SF Mono','Fira Code',monospace;border-radius:8px;background:rgba(59,130,246,0.15);border:1px solid #3b82f6;letter-spacing:1px;">Orders</a>
</div>
<main>
  <div class="page-title">Limit Orders</div>
  <div class="page-sub">Sortiert nach Wahrscheinlichkeit · Konfluenz-basiert</div>
  <div id="content">
    <div class="empty"><h3>Lade Orders...</h3></div>
  </div>
</main>
<footer>The Trading Floor · Cockpit Trader · Auction Market Theory</footer>
<script>
async function load(){
  try{
    const r=await fetch('journal-data.json?t='+Date.now());
    if(!r.ok) throw new Error();
    return await r.json();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty"><h3>Keine Orders vorhanden</h3><p>Werden nach der Morning-Analyse erstellt.</p></div>';
    return null;
  }
}
function render(d){
  if(!d)return;

  // Collect orders from all instruments
  let all=[];
  (d.instruments||[]).forEach(inst=>{
    (inst.orders||[]).forEach(o=>{
      all.push({...o,instrument:inst.name,bias:inst.bias,bias_score:inst.bias_score});
    });
  });

  // Sort by P(TP1) descending
  all.sort((a,b)=>(parseFloat(b.p_tp1)||0)-(parseFloat(a.p_tp1)||0));

  if(!all.length){
    document.getElementById('content').innerHTML='<div class="empty"><h3>Keine Orders für heute</h3><p>Kein Setup mit ausreichender Konfluenz gefunden.</p></div>';
    return;
  }

  const longs=all.filter(o=>(o.type||'').toLowerCase().includes('buy')).length;
  const shorts=all.length-longs;
  const avgRR=(all.reduce((s,o)=>s+(parseFloat(o.rr)||0),0)/all.length).toFixed(1);

  let h='<div class="ts">'+d.date+'</div>';
  h+='<div class="stats-bar">';
  h+='<div class="stat"><div class="stat-label">Total</div><div class="stat-value">'+all.length+'</div></div>';
  h+='<div class="stat"><div class="stat-label">Long</div><div class="stat-value" style="color:var(--green)">'+longs+'</div></div>';
  h+='<div class="stat"><div class="stat-label">Short</div><div class="stat-value" style="color:var(--red)">'+shorts+'</div></div>';
  h+='<div class="stat"><div class="stat-label">Ø R:R</div><div class="stat-value" style="color:var(--cyan)">'+avgRR+'</div></div>';
  h+='</div>';

  all.forEach((o,i)=>{
    const isBuy=(o.type||'').toLowerCase().includes('buy');
    const typeCls=isBuy?'type-buy':'type-sell';
    const pFill=parseFloat(o.p_fill)||0;
    const pTp1=parseFloat(o.p_tp1)||0;
    const conf=(o.confluence||'');
    const dots=conf.split(/[✓+,]/).length-1;

    h+='<div class="order">';

    // Header
    h+='<div class="order-top"><div class="order-inst">'+(o.instrument||'—')+(i===0?' ⭐':'')+'</div>';
    h+='<div class="order-type '+typeCls+'">'+(o.type||'—')+'</div></div>';

    // Prices
    h+='<div class="price-grid">';
    h+='<div class="pg"><div class="pg-label">Entry</div><div class="pg-value">'+(o.entry||'—')+'</div></div>';
    h+='<div class="pg"><div class="pg-label">Stop</div><div class="pg-value" style="color:var(--red)">'+(o.sl||'—')+'</div></div>';
    h+='<div class="pg"><div class="pg-label">TP1</div><div class="pg-value" style="color:var(--green)">'+(o.tp1||'—')+'</div></div>';
    h+='</div>';

    // Probabilities + R:R
    h+='<div class="prob-section">';
    h+='<div class="rr-badge"><span class="rr-label">R:R</span><span class="rr-value">'+(o.rr||'—')+'</span></div>';
    h+='<div class="prob-row"><span class="prob-label">Fill</span><div class="prob-bar"><div class="prob-fill" style="width:'+pFill+'%;background:var(--blue)"></div></div><span class="prob-pct">'+pFill+'%</span></div>';
    h+='<div class="prob-row"><span class="prob-label">TP1</span><div class="prob-bar"><div class="prob-fill" style="width:'+pTp1+'%;background:var(--green)"></div></div><span class="prob-pct">'+pTp1+'%</span></div>';
    h+='</div>';

    // Confluence
    h+='<div class="conf">';
    h+='<span class="conf-dots">'+'●'.repeat(Math.min(dots,5))+'○'.repeat(Math.max(5-dots,0))+'</span>';
    h+=conf;
    if(o.tf) h+='<div class="conf-tf">Timeframe: '+o.tf+'</div>';
    h+='</div>';

    h+='</div>';
  });

  document.getElementById('content').innerHTML=h;
}
load().then(render);
</script>
</body>
</html>
