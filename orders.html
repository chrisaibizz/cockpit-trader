<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cockpit-Trader — Orders</title>
<style>
:root{
  --bg:#0d1117;--card:#161b22;--border:#21262d;
  --text:#e2e8f0;--muted:#8b949e;--dim:#30363d;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --blue:#3b82f6;--cyan:#38bdf8;--magenta:#d946ef;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;min-height:100vh}

/* ── NAV ─────────────────────────────────────────────────────────── */
nav{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-weight:800;font-size:13px;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.nav-brand .ico{font-size:15px;opacity:.85}
.nav-brand .name{color:var(--cyan)}
.nav-links{display:flex;gap:2px}
.nav-links a{color:var(--muted);text-decoration:none;padding:5px 10px;font-size:11px;font-weight:600;border-radius:6px;letter-spacing:.5px;transition:all .15s}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-links a.active{color:var(--cyan);background:rgba(56,189,248,.1)}

/* ── HEADER ──────────────────────────────────────────────────────── */
header{text-align:center;padding:22px 16px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(56,189,248,.06) 0%,transparent 100%)}
.h-icon{font-size:26px;margin-bottom:4px;opacity:.7}
.h-title{font-size:20px;font-weight:800;letter-spacing:6px;color:var(--cyan);text-transform:uppercase}
.h-sub{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.5px}
.status-line{margin-top:8px;display:inline-flex;align-items:center;gap:6px;font-size:10px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,.02);border:1px solid var(--border)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.status-dot.stale{background:var(--red);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── STATS BAR ───────────────────────────────────────────────────── */
main{padding:16px;max-width:1400px;margin:0 auto}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat{text-align:center;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 6px}
.stat-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:20px;font-weight:800;font-family:monospace;margin-top:2px}

/* ── TABLE WRAPPER ───────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:rgba(255,255,255,.03);border-bottom:2px solid var(--border)}
thead th{padding:10px 12px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody tr:first-child{border-left:3px solid var(--cyan)}
td{padding:10px 12px;vertical-align:middle;white-space:nowrap}

/* Column-specific styles */
.td-inst{font-weight:700;font-size:13px}
.td-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:10px;display:inline-block}
.type-buy{background:rgba(34,197,94,.1);color:var(--green)}
.type-sell{background:rgba(239,68,68,.1);color:var(--red)}
.td-price{font-family:monospace;font-weight:600;font-size:13px}
.td-sl{color:var(--red)}
.td-tp{color:var(--green)}
.td-rr{font-family:monospace;font-weight:700;color:var(--cyan)}
.td-pct{font-family:monospace;font-weight:700}
.td-conf{font-size:11px;color:var(--muted);max-width:200px;white-space:normal;line-height:1.3}

/* P_Fill% bar */
.pct-cell{display:flex;align-items:center;gap:6px}
.pct-bar-bg{width:40px;height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;flex-shrink:0}
.pct-bar{height:4px;border-radius:4px}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--dim)}
.empty h3{color:var(--muted);font-size:14px;margin-bottom:8px}
.empty p{font-size:12px;line-height:1.6}

footer{text-align:center;padding:20px;font-size:10px;color:var(--dim);border-top:1px solid var(--border);margin-top:32px}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <span class="ico">✈</span>
    <span>COCKPIT-<span class="name">TRADER</span></span>
  </div>
  <div class="nav-links">
    <a href="index.html">Dashboard</a>
    <a href="journal.html">Journal</a>
    <a href="orders.html" class="active">Orders</a>
  </div>
</nav>

<header>
  <div class="h-icon">✈</div>
  <div class="h-title">Cockpit-Trader</div>
  <div class="h-sub">Limit Orders — <span id="ts-display">–</span></div>
  <div class="status-line">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Lade Daten…</span>
  </div>
</header>

<main>
  <div class="stats-bar" id="stats-bar" style="display:none">
    <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">Long</div><div class="stat-value" style="color:var(--green)" id="s-long">0</div></div>
    <div class="stat"><div class="stat-label">Short</div><div class="stat-value" style="color:var(--red)" id="s-short">0</div></div>
    <div class="stat"><div class="stat-label">Ø R:R</div><div class="stat-value" style="color:var(--cyan)" id="s-rr">—</div></div>
  </div>
  <div id="content">
    <div class="empty"><h3>Lade Orders…</h3></div>
  </div>
</main>

<footer>The Trading Floor · Cockpit Trader · Auction Market Theory</footer>

<script>
async function loadOrders() {
  try {
    const res = await fetch('journal-data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();

    // Header status
    const ts    = new Date(d.timestamp);
    const ageH  = (Date.now() - ts) / 3600000;
    const tsStr = ts.toLocaleDateString('de-DE') + ' ' +
                  ts.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('ts-display').textContent = tsStr;
    const dot  = document.getElementById('status-dot');
    const stxt = document.getElementById('status-text');
    if (ageH > 4) {
      dot.classList.add('stale');
      stxt.textContent = `VERALTET — ${Math.round(ageH)}h alt`;
      stxt.style.color = 'var(--red)';
    } else {
      stxt.textContent = `OK — ${Math.round(ageH * 60)}min`;
      stxt.style.color = 'var(--green)';
    }

    // Collect all orders from all instruments
    let all = [];
    (d.instruments || []).forEach(inst => {
      (inst.orders || []).forEach(o => {
        all.push({ ...o, instrument: inst.name, bias: inst.bias });
      });
    });

    // Sort by P_Fill% descending
    all.sort((a, b) => parseFloat(b.p_fill || 0) - parseFloat(a.p_fill || 0));

    if (!all.length) {
      document.getElementById('content').innerHTML =
        '<div class="empty"><h3>Keine Orders für heute</h3><p>Kein Setup mit ausreichender Konfluenz gefunden.</p></div>';
      return;
    }

    // Stats
    const longs  = all.filter(o => (o.type || '').toLowerCase().includes('buy')).length;
    const shorts = all.length - longs;
    const avgRR  = (all.reduce((s, o) => s + (parseFloat(o.rr) || 0), 0) / all.length).toFixed(1);
    document.getElementById('stats-bar').style.display = 'grid';
    document.getElementById('s-total').textContent = all.length;
    document.getElementById('s-long').textContent  = longs;
    document.getElementById('s-short').textContent = shorts;
    document.getElementById('s-rr').textContent    = avgRR;

    // Build table
    const rows = all.map((o, i) => {
      const isBuy   = (o.type || '').toLowerCase().includes('buy');
      const typeCls = isBuy ? 'type-buy' : 'type-sell';
      const pFill   = parseFloat(o.p_fill) || 0;
      const pTp1    = parseFloat(o.p_tp1)  || 0;
      const fillCol = pFill >= 60 ? 'var(--green)' : pFill >= 40 ? 'var(--yellow)' : 'var(--muted)';
      const tp1Col  = pTp1  >= 60 ? 'var(--green)' : pTp1  >= 40 ? 'var(--yellow)' : 'var(--muted)';
      return `
        <tr>
          <td class="td-inst">${o.instrument || '—'}${i === 0 ? ' ⭐' : ''}</td>
          <td><span class="td-type ${typeCls}">${o.type || '—'}</span></td>
          <td class="td-price">${o.entry || '—'}</td>
          <td class="td-price td-sl">${o.sl || '—'}</td>
          <td class="td-price td-tp">${o.tp1 || '—'}</td>
          <td class="td-price td-tp">${o.tp2 || '—'}</td>
          <td class="td-rr">${o.rr || '—'}</td>
          <td>
            <div class="pct-cell">
              <div class="pct-bar-bg"><div class="pct-bar" style="width:${pFill}%;background:${fillCol}"></div></div>
              <span class="td-pct" style="color:${fillCol}">${pFill}%</span>
            </div>
          </td>
          <td>
            <div class="pct-cell">
              <div class="pct-bar-bg"><div class="pct-bar" style="width:${pTp1}%;background:${tp1Col}"></div></div>
              <span class="td-pct" style="color:${tp1Col}">${pTp1}%</span>
            </div>
          </td>
          <td class="td-conf">${o.confluence || '—'}</td>
        </tr>`;
    }).join('');

    document.getElementById('content').innerHTML = `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Instrument</th>
              <th>Typ</th>
              <th>Entry</th>
              <th>SL</th>
              <th>TP1</th>
              <th>TP2</th>
              <th>R:R</th>
              <th>P_Fill%</th>
              <th>P_TP1%</th>
              <th>Konfluenz</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;

  } catch (err) {
    document.getElementById('status-text').textContent = 'Fehler: ' + err.message;
    document.getElementById('status-dot').classList.add('stale');
    document.getElementById('content').innerHTML =
      `<div class="empty"><h3>Fehler beim Laden</h3><p>${err.message}</p></div>`;
  }
}

loadOrders();
</script>
</body>
</html>
