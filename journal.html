<!DOCTYPE html>

<title>Cockpit-Trader — Journal</title>
<style>
:root{--bg:#0a0e17;--card:#111827;--border:#1e2a3a;--text:#e2e8f0;--muted:#64748b;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--cyan:#06b6d4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;min-height:100vh;}
.header{text-align:center;padding:20px 20px 14px;border-bottom:1px solid var(--border);}
.header h1{font-size:22px;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header .ts{color:var(--muted);font-size:12px;margin-top:5px;}
#age-bar{margin-top:4px;font-size:11px;display:none;}
.nav{display:flex;justify-content:center;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);}
.nav a{color:var(--muted);text-decoration:none;padding:6px 16px;font-size:12px;border-radius:6px;border:1px solid var(--border);letter-spacing:1px;transition:all .2s;}
.nav a.active{color:var(--text);background:rgba(59,130,246,0.15);border-color:var(--blue);}
.nav a:hover{color:var(--text);border-color:var(--muted);}
.main{max-width:1100px;margin:0 auto;padding:20px;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:6px;}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.card-ts{font-size:10px;color:var(--muted);}

/* Debrief */
.debrief-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.dstat{text-align:center;background:rgba(255,255,255,.02);border-radius:8px;padding:10px 4px;}
.dstat-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.dstat-val{font-size:18px;font-weight:700;margin-top:4px;}

/* Phase Block */
.phase-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.phase-main{display:flex;flex-direction:column;gap:8px;}
.phase-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:1px;}
.phase-trend{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.3);}
.phase-balance{background:rgba(234,179,8,.12);color:var(--yellow);border:1px solid rgba(234,179,8,.3);}
.phase-ausbruch{background:rgba(6,182,212,.12);color:var(--cyan);border:1px solid rgba(6,182,212,.3);}
.phase-extrem{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.phase-meta{display:flex;flex-direction:column;gap:6px;}
.pmeta-row{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.pmeta-key{color:var(--muted);}
.pmeta-val{font-weight:600;}

/* Alignment dots */
.align-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.align-tf{display:flex;flex-direction:column;align-items:center;gap:3px;}
.align-dot{width:10px;height:10px;border-radius:50%;}
.align-lbl{font-size:9px;color:var(--muted);}
.align-score{font-size:20px;font-weight:700;margin-left:8px;}

/* Instrument section */
.inst-block{margin-bottom:6px;}
.inst-top{display:flex;align-items:center;gap:16px;margin-bottom:14px;flex-wrap:wrap;}
.tl{display:flex;flex-direction:column;gap:3px;background:#000;padding:5px 4px;border-radius:12px;border:1px solid #333;}
.lb{width:9px;height:9px;border-radius:50%;background:#1a1a1a;}
.inst-name-big{font-size:20px;font-weight:700;}
.bias-pill{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.bp-g{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.3);}
.bp-r{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.bp-y{background:rgba(234,179,8,.12);color:var(--yellow);border:1px solid rgba(234,179,8,.3);}

/* Conf bar */
.cbar{margin:0 0 14px;}
.cbar-bg{background:rgba(255,255,255,.06);border-radius:4px;height:6px;overflow:hidden;}
.cbar-fill{height:100%;border-radius:4px;}
.cbar-lbl{font-size:11px;color:var(--muted);margin-top:4px;}

/* Two-col table */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.tcol{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:12px;}
.tcol-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
.level-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;}
.level-key{color:var(--muted);}
.level-val{font-weight:600;}
.shape-badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(59,130,246,.1);color:var(--blue);margin-bottom:8px;}
.shape-desc{font-size:12px;color:var(--muted);line-height:1.6;}
.shape-prog{font-size:12px;color:var(--cyan);margin-top:6px;line-height:1.6;}
.shape-prog::before{content:"→ Prognose: ";color:var(--muted);}

/* Signal list */
.sig-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;}
.sig-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:6px;margin-bottom:3px;font-size:12px;}
.sig-pos{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.15);}
.sig-neg{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);}
.sig-neu{background:rgba(255,255,255,.02);border:1px solid var(--border);}
.sig-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-right:8px;}
.sig-score{font-weight:700;min-width:28px;text-align:right;}

/* Invalidation */
.inval{font-size:11px;color:var(--red);background:rgba(239,68,68,.06);padding:7px 10px;border-radius:6px;border:1px solid rgba(239,68,68,.2);margin-top:4px;}

/* Session warning */
.sess-warn{font-size:11px;color:var(--yellow);background:rgba(234,179,8,.06);padding:7px 10px;border-radius:6px;border:1px solid rgba(234,179,8,.2);margin-bottom:10px;}

.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}

.loading{text-align:center;padding:60px;color:var(--muted);}
footer{text-align:center;padding:20px;font-size:10px;color:var(--muted);border-top:1px solid var(--border);margin-top:8px;}

@media(max-width:768px){
  .two-col{grid-template-columns:1fr;}
  .phase-grid{grid-template-columns:1fr;}
  .debrief-grid{grid-template-columns:1fr 1fr;}
  .main{padding:12px;}
}
</style>

  // ── 2. CAPTAIN BRIEFING (oben) ─────────────────────────────────────
  if(cap.trade_plan||cap.session_bias){
    h+='<div class="card">';
    h+='<div class="card-header"><span class="card-title">✈ Captain Briefing</span><span class="card-ts">'+tsStr+'</span></div>';
    h+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;">';
    if(cap.session_bias)h+='<span style="font-size:14px;font-weight:700;color:'+(cap.session_bias.includes('LONG')?'var(--green)':cap.session_bias.includes('SHORT')?'var(--red)':'var(--yellow)')+'">'+cap.session_bias+'</span>';
    if(cap.aktive_strategie)h+='<span style="font-size:12px;color:var(--muted)">'+cap.aktive_strategie+'</span>';
    if(cap.max_risk_today)h+='<span style="font-size:11px;color:var(--muted)">Max Risk: <strong style="color:var(--text)">'+cap.max_risk_today+'</strong></span>';
    if(cap.max_trades_heute)h+='<span style="font-size:11px;color:var(--muted)">Max Trades: <strong style="color:var(--text)">'+cap.max_trades_heute+'</strong></span>';
    h+='</div>';
    if(cap.trade_plan)h+='<div style="font-size:12px;line-height:1.7;color:var(--muted)">'+cap.trade_plan.replace(/\n/g,'<br>')+'</div>';
    if(cap.notes)h+='<div style="margin-top:8px;font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px">'+cap.notes+'</div>';
    h+='</div>';
  }

  // ── 3. MARKTPHASE ───────────────────────────────────────────────────
  var phase=an.marktphase||{};
  var regime=an.regime||'—';
  var risk=an.risk_level||'—';
  var td=an.top_down||{};
  var score=td.alignment_score||cap.alignment_score||0;
  var scoreMax=7;
  var strategie=phase.aktive_strategie||cap.aktive_strategie||'—';
  var phaseName=phase.phase||'—';
  var phaseCls=phaseClass(phaseName);
  var scCol=scoreColor(score,scoreMax);

  h+='<div class="card">';
  h+='<div class="card-header"><span class="card-title">🌍 Marktphase &amp; Makro</span><span class="card-ts">'+tsStr+'</span></div>';
  h+='<div class="phase-grid">';

  // Left: Phase + Alignment
  h+='<div class="phase-main">';
  h+='<div class="phase-badge '+phaseCls+'">'+phaseName+'</div>';
  if(phase.begruendung)h+='<div style="font-size:11px;color:var(--muted);line-height:1.5">'+phase.begruendung+'</div>';
  h+='<div class="align-row" style="margin-top:8px">';
  var tfs=['W','4H','1H','30M'];
  var tfkeys=['weekly_trend','h4_trend','h1_entry_context','m30_entry_zone'];
  tfs.forEach(function(tf,i){
    var val=td[tfkeys[i]];
    var hasBull=val&&(typeof val==='string'?val.toLowerCase().includes('up')||val.toLowerCase().includes('bull'):false);
    var hasBear=val&&(typeof val==='string'?val.toLowerCase().includes('down')||val.toLowerCase().includes('bear'):false);
    var dc=hasBull?'#22c55e':hasBear?'#ef4444':'#64748b';
    h+='<div class="align-tf"><div class="align-dot" style="background:'+dc+';box-shadow:0 0 6px '+dc+'"></div><div class="align-lbl">'+tf+'</div></div>';
  });
  h+='<div style="display:flex;flex-direction:column;align-items:center;margin-left:8px">';
  h+='<span class="align-score" style="color:'+scCol+'">'+score+'/'+scoreMax+'</span>';
  h+='<span style="font-size:9px;color:var(--muted)">SCORE</span></div>';
  h+='</div>';

  // Session warning
  if(an.session_warnung)h+='<div class="sess-warn">⚠ '+an.session_warnung+'</div>';

  h+='</div>';

  // Right: Regime + Makro
  h+='<div class="phase-meta">';
  h+='<div class="pmeta-row"><span class="pmeta-key">Regime</span><span class="pmeta-val">'+regime+'</span></div>';
  h+='<div class="pmeta-row"><span class="pmeta-key">Risiko</span><span class="pmeta-val">'+risk+'</span></div>';
  h+='<div class="pmeta-row"><span class="pmeta-key">Strategie</span><span class="pmeta-val">'+strategie+'</span></div>';
  h+='<div class="pmeta-row"><span class="pmeta-key">Session-Bias</span><span class="pmeta-val">'+(cap.session_bias||'—')+'</span></div>';
  // Makro summary
  var ms=mac.scoring||{};
  if(ms.makro_bias)h+='<div class="pmeta-row"><span class="pmeta-key">Makro-Bias</span><span class="pmeta-val" style="color:'+(ms.makro_bias.includes('RISK_ON')?'var(--green)':ms.makro_bias.includes('RISK_OFF')?'var(--red)':'var(--yellow)')+'">'+ms.makro_bias+'</span></div>';
  var vix=mac.vix;
  if(vix)h+='<div class="pmeta-row"><span class="pmeta-key">VIX</span><span class="pmeta-val '+(vix.trend==='fallend'?'style="color:var(--green)"':'style="color:var(--red)"')+'">'+(vix.value||'—')+' ('+vix.level+', '+vix.trend+')</span></div>';
  var fg=mac.fear_greed;
  if(fg)h+='<div class="pmeta-row"><span class="pmeta-key">Fear&amp;Greed</span><span class="pmeta-val">'+(fg.value||'—')+' — '+(fg.classification||'')+'</span></div>';
  // Warnungen
  var warns=(mac.warnungen||[]).concat(an.watchlist||[]);
  if(warns.length){h+='<div style="margin-top:6px">';warns.slice(0,3).forEach(function(w){h+='<div style="font-size:10px;color:var(--yellow);padding:2px 0">⚠ '+w+'</div>';});h+='</div>';}
  h+='</div>';
  h+='</div></div>';

  // ── 3. INSTRUMENTE ──────────────────────────────────────────────────
  var instKeys=['GER40','DJ30','SPX500'];
  instKeys.forEach(function(key){
    var ai=an.instruments&&an.instruments[key]||{};
    var mi=mkt.instruments&&mkt.instruments[key]||{};
    if(!ai.bias&&!mi.poc)return;

    var bias=ai.bias||'—';
    var bcolor=bias.toLowerCase().includes('bull')?'green':bias.toLowerCase().includes('bear')?'red':'yellow';
    var gc=bcolor==='green'?'#22c55e':bcolor==='red'?'#ef4444':'#eab308';
    var bpCls=bcolor==='green'?'bp-g':bcolor==='red'?'bp-r':'bp-y';
    var bs=ai.bias_score||0;
    var bsMax=7;
    var bsCol=scoreColor(bs<0?0:bs,bsMax);

    h+='<div class="card">';
    h+='<div class="card-header"><span class="card-title">📈 '+key+'</span><span class="card-ts">'+tsStr+'</span></div>';

    // Top: Ampel + Name + Bias + Score
    h+='<div class="inst-top">';
    h+=tl(bcolor);
    h+='<span class="inst-name-big">'+key+'</span>';
    h+=biasPill(bias);
    h+='<span style="font-size:12px;color:var(--muted)">Score: <strong style="color:'+bsCol+'">'+bs+'/'+bsMax+'</strong></span>';
    if(ai.er_wert!=null)h+='<span style="font-size:11px;color:var(--muted)">ER: <strong style="color:'+(ai.er_wert>10?'var(--green)':ai.er_wert<-10?'var(--red)':'var(--yellow)')+'">'+f(ai.er_wert,1)+'</strong></span>';
    h+='</div>';

    // Confluence bar
    var cpct=Math.round(Math.max(0,Math.min(100,(bs/bsMax)*100)));
    var ccol=bsCol;
    h+='<div class="cbar"><div class="cbar-bg"><div class="cbar-fill" style="width:'+cpct+'%;background:'+ccol+'"></div></div>';
    h+='<div class="cbar-lbl">Confluence: <strong style="color:'+ccol+'">'+bs+'/'+bsMax+'</strong>'+(ai.er_chop_filter_aktiv?' — ⚠ Chop-Filter aktiv':'')+'</div></div>';

    // Two-col: MP/VP Levels | Shape Analyse
    h+='<div class="two-col">';

    // Left: Levels
    h+='<div class="tcol"><div class="tcol-title">📊 Market &amp; Volume Profile</div>';
    var kl=ai.key_levels||{};
    var lvls=[
      {k:'Kurs aktuell',v:kl.current||mi.current_price,c:'var(--text)',bold:true},
      {k:'VAH',v:kl.vah||mi.vah,c:'var(--green)'},
      {k:'POC',v:kl.poc||mi.poc,c:'var(--cyan)'},
      {k:'VAL',v:kl.val||mi.val,c:'var(--red)'},
      {k:'VWAP',v:kl.vwap||mi.vwap,c:'var(--yellow)'},
      {k:'VWAP +1σ',v:mi.vwap_upper,c:'rgba(234,179,8,.6)'},
      {k:'VWAP -1σ',v:mi.vwap_lower,c:'rgba(234,179,8,.6)'},
      {k:'Weekly POC',v:mi.weekly_poc,c:'rgba(6,182,212,.7)'},
      {k:'ONH',v:kl.onh||mi.onh,c:'rgba(34,197,94,.7)'},
      {k:'ONL',v:kl.onl||mi.onl,c:'rgba(239,68,68,.7)'},
      {k:'PDH',v:kl.pdh||mi.pdh,c:'rgba(34,197,94,.5)'},
      {k:'PDL',v:kl.pdl||mi.pdl,c:'rgba(239,68,68,.5)'},
    ];
    lvls.forEach(function(l){
      if(l.v==null)return;
      var fw=l.bold?'font-weight:700;font-size:13px;':'';
      h+='<div class="level-row" style="'+(l.bold?'border-bottom:1px solid var(--border);margin-bottom:4px;padding-bottom:6px;':'')+'">'+'<span class="level-key" style="'+(l.bold?'color:var(--text);font-weight:600;':'')+'">'+l.k+'</span><span class="level-val" style="color:'+l.c+';'+fw+'">'+f(l.v)+'</span></div>';
    });
    if(kl.invalidation)h+='<div class="inval" style="margin-top:8px">⚠ Invalidierung: '+f(kl.invalidation)+'</div>';
    h+='</div>';

    // Right: Shape + Prognose
    h+='<div class="tcol"><div class="tcol-title">📐 MP Shape &amp; Prognose</div>';
    var mpShape=mi.mp_shape||'Normal Day';
    h+='<div class="shape-badge">'+mpShape+'</div>';
    // Shape interpretation
    var shapeDesc=getShapeDesc(mpShape);
    h+='<div class="shape-desc">'+shapeDesc.desc+'</div>';
    h+='<div class="shape-prog">'+shapeDesc.prog+'</div>';
    // Phase context
    if(phase.phase){
      h+='<div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">';
      h+='<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Marktphase Kontext</div>';
      h+='<div style="font-size:11px;color:var(--cyan)">'+phaseName+' → '+strategie+'</div>';
      if(phase.er_bestaetigung)h+='<div style="font-size:11px;color:var(--muted);margin-top:3px">ER Bestätigung: '+(phase.er_bestaetigung==='ja'?'<span style="color:var(--green)">✓ Ja</span>':phase.er_bestaetigung==='nein'?'<span style="color:var(--red)">✗ Nein</span>':'n/v')+'</div>';
      h+='</div>';
    }
    h+='</div>';
    h+='</div>'; // two-col

    // Confluence Signals — sorted by score
    var sigs=ai.signals||{};
    var sigArr=[];
    Object.keys(sigs).forEach(function(k){
      var s=sigs[k];
      if(s&&s.detail)sigArr.push({key:k,wert:s.wert||0,detail:s.detail});
    });
    sigArr.sort(function(a,b){return Math.abs(b.wert)-Math.abs(a.wert);});

    if(sigArr.length){
      var posSum=0,negSum=0;
      sigArr.forEach(function(s){s.wert>0?posSum+=s.wert:negSum+=s.wert;});
      h+='<div style="margin-top:4px">';
      h+='<div class="sig-title"><span>🔍 Confluence Score — Details</span><span>+'+posSum+' / '+negSum+' = '+bs+'</span></div>';
      sigArr.forEach(function(s){
        var cls=s.wert>0?'sig-pos':s.wert<0?'sig-neg':'sig-neu';
        var dc=s.wert>0?'#22c55e':s.wert<0?'#ef4444':'#64748b';
        var sc=s.wert>0?'+'+s.wert:String(s.wert);
        h+='<div class="sig-row '+cls+'"><span style="display:flex;align-items:center"><span class="sig-dot" style="background:'+dc+'"></span>'+s.detail+'</span><span class="sig-score" style="color:'+dc+'">'+sc+'</span></div>';
      });
      h+='</div>';
    }

    // Zones
    var zones=ai.zones||[];
    if(zones.length){
      h+='<div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">';
      h+='<div class="sig-title"><span>🗺 Key Zones</span></div>';
      zones.slice(0,5).forEach(function(z){
        var zc=z.typ==='support'?'var(--green)':z.typ==='resistance'?'var(--red)':'var(--cyan)';
        h+='<div class="sig-row sig-neu"><span style="color:'+zc+'">P'+z.prioritaet+' '+z.name+' ('+f(z.preis_von)+' – '+f(z.preis_bis)+')</span><span style="font-size:10px;color:var(--muted)">'+( z.bestandteile&&z.bestandteile.join(', ')||'')+'</span></div>';
      });
      h+='</div>';
    }

    if(ai.konflikt)h+='<div class="sess-warn" style="margin-top:8px">⚡ Konflikt: '+ai.konflikt+'</div>';

    h+='</div>'; // card
  });



  document.getElementById('main').innerHTML=h;
}

// MP Shape descriptions
function getShapeDesc(shape){
  var shapes={
    'Normal Day':{desc:'Ausbalancierter Tag — Preis pendelt um POC. Käufer und Verkäufer im Gleichgewicht.',prog:'Fortsetzung der Range wahrscheinlich. POC als Magnet. VAH/VAL als Grenzen.'},
    'Trend Day Up':{desc:'Starker Aufwärtstrend — einseitige Auktion. Wenig Gegenwehr. Schlusskurs nahe Tageshoch.',prog:'Pullback-Käufe an gestrigem VAH oder POC wahrscheinlich. Trend-Following.'},
    'Trend Day Down':{desc:'Starker Abwärtstrend — einseitige Auktion abwärts. Schlusskurs nahe Tagestief.',prog:'Bounces an gestrigem VAL oder POC als Short-Einstiege. Trend-Following.'},
    'Double Distribution':{desc:'Zwei getrennte Value Areas — Markt hat zweimal eine neue Balance gefunden.',prog:'Lücke zwischen den Distributions als Magnet. Richtung der zweiten VA bestimmt Bias.'},
    'P-Shape':{desc:'Aufwärtsbewegung mit nachfolgender Konsolidierung oben. Starke Käufer.',prog:'Long-Bias. Pullbacks in den oberen Bereich kaufen. POC als Support.'},
    'b-Shape':{desc:'Abwärtsbewegung mit nachfolgender Konsolidierung unten. Starke Verkäufer.',prog:'Short-Bias. Bounces in den unteren Bereich shorten. POC als Resistance.'},
    'Neutral Day':{desc:'Keine klare Richtung — Markt testet beide Extreme ohne Folgebewegung.',prog:'Abwarten. Ausbruch über VAH oder unter VAL als Signal für Richtungsentscheidung.'},
  };
  return shapes[shape]||{desc:'Marktstruktur in Analyse.',prog:'Weitere Daten erforderlich.'};
}

// Load state.json
async function load(){
  // Use injected data first (local preview)
  if(window.__STATE_DATA__){render(window.__STATE_DATA__);return;}
  // Try state.json (GitHub Pages)
  try{
    var r=await fetch('state.json?t='+Date.now());
    if(r.ok){var d=await r.json();render(d);return;}
  }catch(e){}
  // Fallback: journal-data.json
  try{
    var r2=await fetch('journal-data.json?t='+Date.now());
    if(r2.ok){var d2=await r2.json();renderLegacy(d2);return;}
  }catch(e){}
  document.getElementById('main').innerHTML='<div class="loading">❌ Keine Analyse-Daten<br><small>Pipeline muss zuerst laufen</small></div>';
}

function renderLegacy(d){
  // Minimal legacy render for old journal-data.json format
  if(!d)return;
  var ts=d.timestamp||null;
  if(ts){_ts=new Date(ts);document.getElementById('ts').textContent='Journal (Legacy) — '+_ts.toLocaleDateString('de-DE');document.getElementById('age-bar').style.display='block';updateAge();}
  // Wrap old data into state-like structure for render()
  var wrapped={
    pipeline:{started:ts},
    analysis:{
      marktphase:{phase:d.phase||'—',aktive_strategie:d.regime||'—'},
      regime:d.regime||'—',
      instruments:{}
    },
    macro:{scoring:{makro_bias:d.makro_bias||'—'}},
    market:{instruments:{}},
    captain:{session_bias:d.session_bias||'—'},
    debrief:d.debrief||null,
    stats:d.stats||null
  };
  // Map instruments
  if(d.instruments){Object.keys(d.instruments).forEach(function(k){var i=d.instruments[k];wrapped.analysis.instruments[k]={bias:i.bias,bias_score:i.score,key_levels:{poc:i.poc,vah:i.vah,val:i.val}};wrapped.market.instruments[k]={poc:i.poc,vah:i.vah,val:i.val};});}
  render(wrapped);
}

load();
</script>
