<title>Cockpit-Trader — Morning Briefing</title>
<style>
  :root {
    --bg:#0a0e17;--card:#111827;--border:#1e2a3a;--text:#e2e8f0;
    --muted:#64748b;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
    --blue:#3b82f6;--cyan:#06b6d4;--white:#f1f5f9;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;padding:20px;min-height:100vh;}
  .header{text-align:center;padding:20px 0 30px;border-bottom:1px solid var(--border);margin-bottom:30px;}
  .header h1{font-size:28px;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .header .ts{color:var(--muted);font-size:13px;margin-top:8px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1400px;margin:0 auto;}
  .fw{grid-column:1/-1;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;}
  .ct{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:16px;}
  .bias-wrap{display:flex;align-items:center;gap:24px;padding:10px 0;}
  .tlight{display:flex;flex-direction:column;gap:6px;background:#000;padding:10px 8px;border-radius:20px;border:2px solid #333;}
  .light{width:32px;height:32px;border-radius:50%;background:#1a1a1a;transition:all .3s;}
  .ag{background:var(--green);box-shadow:0 0 20px var(--green);}
  .ay{background:var(--yellow);box-shadow:0 0 20px var(--yellow);}
  .ar{background:var(--red);box-shadow:0 0 20px var(--red);}
  .bi{flex:1;}
  .bl{font-size:28px;font-weight:700;letter-spacing:2px;}
  .bs{font-size:14px;color:var(--muted);margin-top:4px;}
  .qrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .qp{font-size:32px;font-weight:700;}
  .qc{font-size:16px;font-weight:600;}
  .pos{color:var(--green);}.neg{color:var(--red);}
  .lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .lb{text-align:center;padding:12px 8px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);}
  .ll{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
  .lv{font-size:18px;font-weight:600;}
  .lpoc{border-color:var(--cyan);}.lpoc .lv{color:var(--cyan);}
  .lvah{border-color:var(--green);}.lvah .lv{color:var(--green);}
  .lval{border-color:var(--red);}.lval .lv{color:var(--red);}
  .lvwap{border-color:var(--yellow);}.lvwap .lv{color:var(--yellow);}
  .vpc{width:100%;height:320px;}
  .vpc svg{width:100%;height:100%;}
  .sbadge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:600;margin-bottom:8px;background:rgba(59,130,246,.15);color:var(--blue);}
  .sdesc{font-size:13px;color:var(--muted);line-height:1.5;}
  .slist{list-style:none;}
  .slist li{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
  .sdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;}
  .ssc{font-weight:600;min-width:30px;text-align:right;}
  .cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .ci{text-align:center;padding:16px 8px;background:rgba(255,255,255,.02);border-radius:8px;border:1px solid var(--border);}
  .cl2{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .cp2{font-size:20px;font-weight:600;}
  .cc2{font-size:12px;margin-top:4px;}
  .cale{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;align-items:center;}
  .cat{color:var(--cyan);min-width:55px;font-size:12px;}
  .can{flex:1;}
  .cac{color:var(--muted);min-width:30px;text-align:right;font-size:12px;}
  .imp-high{color:var(--red);font-weight:700;min-width:20px;}
  .imp-medium{color:var(--yellow);min-width:20px;}
  .day-label{padding:10px 0 4px;font-size:12px;letter-spacing:1px;border-top:1px solid var(--border);margin-top:4px;}
  .kassa-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;
               background:rgba(6,182,212,0.15);color:var(--cyan);border:1px solid var(--cyan);
               margin-left:8px;letter-spacing:1px;vertical-align:middle;}
  .loading{text-align:center;padding:60px;color:var(--muted);}
  @media(max-width:768px){
    .grid{grid-template-columns:1fr;}
    .lgrid{grid-template-columns:repeat(2,1fr);}
    .cgrid{grid-template-columns:repeat(2,1fr);}
  }
</style>

<script>
function load(){
  if(window.__COCKPIT_DATA__){
    render(window.__COCKPIT_DATA__);
    return;
  }
  fetch('data.json')
    .then(r=>{ if(!r.ok) throw new Error('data.json nicht gefunden'); return r.json(); })
    .then(render)
    .catch(e=>{
      document.getElementById('dash').innerHTML=
        `<div class="loading fw">❌ ${e.message}<br><small>python cockpit-morning.py ausführen — öffne cockpit-briefing.html</small></div>`;
    });
}

let _analysisTs=null;

function fmtAge(ts){
  const mins=Math.floor((Date.now()-ts.getTime())/60000);
  if(mins<1)  return {txt:'gerade eben aktualisiert', color:'#22c55e'};
  if(mins<60) return {txt:`vor ${mins} Min aktualisiert`, color:'#22c55e'};
  const h=Math.floor(mins/60), m=mins%60;
  if(h<4)     return {txt:`vor ${h}h ${m}min aktualisiert`, color:'#eab308'};
  if(h<8)     return {txt:`vor ${h}h aktualisiert — bitte neu starten`, color:'#f97316'};
  return       {txt:`Analyse ${h}h alt — VERALTET`, color:'#ef4444'};
}

function updateAge(){
  if(!_analysisTs) return;
  const {txt,color}=fmtAge(_analysisTs);
  document.getElementById('age-txt').textContent=txt;
  document.getElementById('age-txt').style.color=color;
  document.getElementById('age-dot').style.background=color;
  document.getElementById('age-dot').style.boxShadow=`0 0 6px ${color}`;
}

function render(d){
  _analysisTs=new Date(d.timestamp);
  const ts=_analysisTs;
  document.getElementById('ts').textContent=
    `Pre-Flight Briefing — ${ts.toLocaleDateString('de-DE')} ${ts.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} Uhr`;
  document.getElementById('age-bar').style.display='block';
  updateAge();
  setInterval(updateAge, 60000);
  let html='';
  html+=renderCtx(d.context);
  html+=renderCal(d.calendar);
  const insts=(d.journal&&d.journal.instruments)||[];
  if(insts.length){
    insts.forEach(ji=>{ html+=renderInst(ji); });
  } else {
    for(const[k,inst] of Object.entries(d.instruments||{})){
      if(!inst.error) html+=renderInstLegacy(k,inst);
    }
  }
  document.getElementById('dash').innerHTML=html;
}

function biasColor(c){
  return c==='green'?'#22c55e':c==='red'?'#ef4444':'#eab308';
}

function tlight(color){
  const gc=biasColor(color);
  return `<div class="tlight">
    <div class="light" style="${color==='green'?`background:#22c55e;box-shadow:0 0 20px #22c55e`:''}" ></div>
    <div class="light" style="${color==='yellow'?`background:#eab308;box-shadow:0 0 20px #eab308`:''}" ></div>
    <div class="light" style="${color==='red'?`background:#ef4444;box-shadow:0 0 20px #ef4444`:''}" ></div>
  </div>`;
}

function renderInst(ji){
  const mp    = ji.market_profile||{};
  const q     = ji.quote||{};
  const cvd   = ji.cvd||{};
  const price = ji.current_price;
  const color = ji.bias_color||'yellow';
  const gc    = biasColor(color);
  const cc    = (q.change||0)>=0?'pos':'neg';
  const cs    = (q.change||0)>=0?'+':'';
  const shape = mp.shape||{};

  // Key Levels: aus journal key_levels
  const klRows=(ji.key_levels||[]).map(kl=>`
    <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;">
      <span style="color:var(--muted)">${kl.level}</span>
      <span style="font-weight:600;color:#f1f5f9">${kl.price}</span>
      <span style="color:var(--muted);font-size:11px">${kl.source||''}</span>
    </div>`).join('');

  // Orders
  const orderCards=(ji.orders||[]).map(o=>{
    const oc=o.type&&o.type.includes('Buy')?'var(--green)':'var(--red)';
    return `<div style="border:1px solid ${oc};border-radius:8px;padding:10px;margin-top:8px;font-size:13px;">
      <div style="color:${oc};font-weight:700;margin-bottom:6px">${o.type||'—'}</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px 12px;">
        <span style="color:var(--muted)">Entry</span><span style="color:var(--muted)">SL</span><span style="color:var(--muted)">TP1</span>
        <span style="font-weight:600">${o.entry||'—'}</span><span style="font-weight:600;color:var(--red)">${o.sl||'—'}</span><span style="font-weight:600;color:var(--green)">${o.tp1||'—'}</span>
      </div>
      <div style="margin-top:6px;color:var(--muted)">R:R <span style="color:#f1f5f9;font-weight:600">${o.rr||'—'}</span>
        &nbsp;|&nbsp; P(Fill) <span style="color:#f1f5f9">${o.p_fill||'—'}%</span>
        &nbsp;|&nbsp; P(TP1) <span style="color:#f1f5f9">${o.p_tp1||'—'}%</span>
        &nbsp;|&nbsp; TF <span style="color:#f1f5f9">${o.tf||'—'}</span>
      </div>
      <div style="margin-top:4px;font-size:11px;color:var(--muted)">${o.confluence||''}</div>
    </div>`;
  }).join('');

  // Bias Signals
  const sigRows=(ji.bias_signals||[]).map(s=>`
    <li>
      <span>
        <span class="sdot" style="background:${s.direction==='bullish'?'var(--green)':s.direction==='bearish'?'var(--red)':'var(--muted)'}"></span>
        ${s.label}
      </span>
      <span class="ssc ${s.score>0?'pos':s.score<0?'neg':''}">${s.score>0?'+'+s.score:s.score}</span>
    </li>`).join('');

  // CVD
  const cvdHtml=cvd.value!=null
    ?`<div style="margin-top:6px;font-size:12px">CVD <span style="font-weight:600;color:${cvd.value>0?'var(--green)':'var(--red)'}">${cvd.value>0?'+':''}${Math.round(cvd.value).toLocaleString('de-DE')}</span> <span style="color:var(--muted)">${cvd.direction||''}</span></div>`
    :'';

  return `
<div class="card">
  <div class="ct">📈 ${ji.name} <span class="kassa-badge">KASSA</span></div>
  <div class="qrow">
    <span class="qp">${f(q.price)}</span>
    <span class="qc ${cc}">${cs}${f(q.change)} (${cs}${f(q.change_pct)}%)</span>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:10px">
    H: ${f(q.high)} &nbsp;|&nbsp; L: ${f(q.low)} &nbsp;|&nbsp; Prev: ${f(q.prev_close)}
  </div>
  <div class="bias-wrap">
    ${tlight(color)}
    <div class="bi">
      <div class="bl" style="color:${gc}">${ji.bias||'—'}</div>
      <div class="bs">Score: ${ji.bias_score??'—'} &nbsp;|&nbsp; Konfluenz: ${ji.bias_pct||'—'}%</div>
      ${cvdHtml}
    </div>
  </div>
  <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">
    ${ji.h30m_summary||''}
  </div>
</div>
<div class="card">
  <div class="ct">🎯 Key Levels — ${ji.name}</div>
  <div class="lgrid" style="margin-bottom:12px">
    <div class="lb lpoc"><div class="ll">POC</div><div class="lv">${f(mp.poc)}</div></div>
    <div class="lb lvah"><div class="ll">VAH</div><div class="lv">${f(mp.vah)}</div></div>
    <div class="lb lval"><div class="ll">VAL</div><div class="lv">${f(mp.val)}</div></div>
    <div class="lb lvwap"><div class="ll">VWAP</div><div class="lv">${f(mp.vwap)}</div></div>
  </div>
  ${klRows}
  <div style="margin-top:12px">
    <span class="sbadge">${shape.name||'—'}</span>
    <div class="sdesc">${shape.description||''}</div>
  </div>
  <div style="margin-top:6px;font-size:11px;color:var(--muted)">
    Range Vortag: ${f(mp.day_low)} – ${f(mp.day_high)}
  </div>
  ${ji.invalidation?`<div style="margin-top:8px;padding:6px 10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:6px;font-size:12px;color:#ef4444">Invalidierung: ${ji.invalidation}</div>`:''}
</div>
<div class="card">
  <div class="ct">📊 Levels Chart — ${ji.name}
    <span style="margin-left:8px;color:#f1f5f9;font-size:10px">── Kurs</span>
    <span style="margin-left:6px;color:#06b6d4;font-size:10px">╌ POC</span>
    <span style="margin-left:6px;color:#22c55e;font-size:10px">╌ VAH</span>
    <span style="margin-left:6px;color:#ef4444;font-size:10px">╌ VAL</span>
  </div>
  <div class="vpc">${drawVP(mp, price)}</div>
</div>
<div class="card">
  <div class="ct">🔍 Bias Signals — ${ji.name}</div>
  <ul class="slist">${sigRows}</ul>
  ${orderCards?`<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:4px">Order Setup</div>${orderCards}</div>`:''}
</div>`;
}

function renderInstLegacy(k,inst){
  const q=inst.quote||{}, mp=inst.market_profile||{}, b=inst.bias||{};
  const cc=(q.change||0)>=0?'pos':'neg', cs=(q.change||0)>=0?'+':'';
  return `
<div class="card">
  <div class="ct">📈 ${k} <span class="kassa-badge">KASSA</span></div>
  <div class="qrow"><span class="qp">${f(q.price)}</span><span class="qc ${cc}">${cs}${f(q.change)} (${cs}${f(q.change_pct)}%)</span></div>
  <div class="bias-wrap">${tlight(b.color)}<div class="bi"><div class="bl" style="color:${biasColor(b.color)}">${b.bias||'—'}</div><div class="bs">Score: ${b.score??'—'}</div></div></div>
</div>
<div class="card">
  <div class="ct">🎯 Key Levels — ${k}</div>
  <div class="lgrid">
    <div class="lb lpoc"><div class="ll">POC</div><div class="lv">${f(mp.poc)}</div></div>
    <div class="lb lvah"><div class="ll">VAH</div><div class="lv">${f(mp.vah)}</div></div>
    <div class="lb lval"><div class="ll">VAL</div><div class="lv">${f(mp.val)}</div></div>
    <div class="lb lvwap"><div class="ll">VWAP</div><div class="lv">${f(mp.vwap)}</div></div>
  </div>
</div>`;
}

function drawVPFromLevels(mp, currentPrice){
  if(!mp||!mp.poc) return '<div style="text-align:center;color:var(--muted);padding:40px">Kein Volume Profile verfuegbar</div>';
  const h=200, w=520, margin=80, rightPad=20;
  const levels=[
    {label:'VAH', price:mp.vah, color:'#22c55e'},
    {label:'POC', price:mp.poc, color:'#06b6d4'},
    {label:'VWAP',price:mp.vwap,color:'#eab308'},
    {label:'VAL', price:mp.val, color:'#ef4444'},
  ].filter(l=>l.price!=null).sort((a,b)=>b.price-a.price);
  if(currentPrice) levels.push({label:'Kurs',price:currentPrice,color:'#f1f5f9',bold:true});
  const allPrices=levels.map(l=>l.price);
  const minP=Math.min(...allPrices), maxP=Math.max(...allPrices);
  const range=maxP-minP||1;
  const p2y=p=>10+(1-(p-minP)/range)*(h-20);
  let lines='';
  levels.forEach(l=>{
    const y=p2y(l.price);
    const dash=l.bold?'':' stroke-dasharray="6,3"';
    const sw=l.bold?2.5:1.5;
    lines+=`<line x1="${margin}" y1="${y}" x2="${w-rightPad}" y2="${y}" stroke="${l.color}" stroke-width="${sw}"${dash}/>`;
    lines+=`<text x="${margin-6}" y="${y+4}" text-anchor="end" fill="${l.color}" font-size="11" font-family="monospace"${l.bold?' font-weight="bold"':''}>${l.price.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})}</text>`;
    lines+=`<text x="${w-rightPad+4}" y="${y+4}" fill="${l.color}" font-size="10" font-family="monospace">${l.label}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px">${lines}</svg>`;
}

function drawVP(mp, currentPrice){
  if(!mp||!mp.volume_profile||!mp.volume_profile.length)
    return drawVPFromLevels(mp, currentPrice);

  const vps    = mp.volume_profile;
  const maxV   = Math.max(...vps.map(b=>b.volume));
  const h=320, w=520, bH=h/vps.length, margin=70, rightPad=20;
  const minP   = vps[0].price;
  const maxP   = vps[vps.length-1].price;
  const priceRange = maxP - minP || 1;
  const p2y    = p => h - ((p - minP) / priceRange) * h;
  const tick   = (vps[1]?.price - vps[0]?.price) || 1;

  const priceInRange = currentPrice !== null &&
                       currentPrice >= minP - priceRange * 0.3 &&
                       currentPrice <= maxP + priceRange * 0.3;
  let bars = '';

  vps.forEach((bin,i)=>{
    const bW = maxV > 0 ? (bin.volume / maxV) * (w - margin - rightPad) : 0;
    const y  = h - (i+1) * bH;
    let col  = 'rgba(59,130,246,0.4)';
    if(mp.poc && Math.abs(bin.price - mp.poc) < tick * 0.6)
      col = 'rgba(6,182,212,0.8)';
    else if(mp.vah && mp.val && bin.price >= mp.val && bin.price <= mp.vah)
      col = 'rgba(59,130,246,0.6)';
    bars += `<rect x="${margin}" y="${y}" width="${bW}" height="${bH-1}" fill="${col}" rx="2"/>`;
    if(i % 4 === 0)
      bars += `<text x="${margin-6}" y="${y+bH/2+4}" text-anchor="end" fill="#64748b" font-size="10" font-family="monospace">${bin.price.toFixed(0)}</text>`;
  });

  if(mp.poc){const y=p2y(mp.poc);
    bars+=`<line x1="${margin}" y1="${y}" x2="${w}" y2="${y}" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,3"/>`;
    bars+=`<text x="${w-4}" y="${y-4}" text-anchor="end" fill="#06b6d4" font-size="11" font-family="monospace">POC ${mp.poc}</text>`;}
  if(mp.vah){const y=p2y(mp.vah);
    bars+=`<line x1="${margin}" y1="${y}" x2="${w}" y2="${y}" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4"/>`;
    bars+=`<text x="${w-4}" y="${y-4}" text-anchor="end" fill="#22c55e" font-size="10" font-family="monospace">VAH ${mp.vah}</text>`;}
  if(mp.val){const y=p2y(mp.val);
    bars+=`<line x1="${margin}" y1="${y}" x2="${w}" y2="${y}" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4"/>`;
    bars+=`<text x="${w-4}" y="${y+14}" text-anchor="end" fill="#ef4444" font-size="10" font-family="monospace">VAL ${mp.val}</text>`;}

  if(priceInRange){
    const y = p2y(currentPrice);
    bars += `<rect x="${margin}" y="${y-9}" width="92" height="18" fill="rgba(241,245,249,0.15)" rx="3"/>`;
    bars += `<line x1="${margin}" y1="${y}" x2="${w-100}" y2="${y}" stroke="#f1f5f9" stroke-width="2"/>`;
    const ax = w-102;
    bars += `<polygon points="${ax},${y-5} ${ax+10},${y} ${ax},${y+5}" fill="#f1f5f9"/>`;
    bars += `<text x="${margin+4}" y="${y+5}" fill="#f1f5f9" font-size="11" font-family="monospace" font-weight="bold">▶ ${currentPrice.toFixed(2)}</text>`;
    bars += `<text x="${w-4}" y="${y+5}" text-anchor="end" fill="#f1f5f9" font-size="11" font-family="monospace" font-weight="bold">${currentPrice.toFixed(2)}</text>`;
  } else if(currentPrice !== null){
    const aboveRange = currentPrice > maxP;
    const arrowY     = aboveRange ? 16 : h-6;
    const arrowChar  = aboveRange ? '▲' : '▼';
    bars += `<text x="${margin+4}" y="${arrowY}" fill="#f1f5f9" font-size="12" font-family="monospace">${arrowChar} Kurs ${currentPrice.toFixed(2)} (ausserhalb Vortags-Range)</text>`;
  }

  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
}

function renderCtx(ctx){
  if(!ctx) return '';
  return `<div class="card fw">
    <div class="ct">🌍 Macro Context</div>
    <div class="cgrid">
      ${['VIX','DXY','US10Y','DAX'].map(k=>{
        const d=ctx[k];
        if(!d) return `<div class="ci"><div class="cl2">${k}</div><div class="cp2">—</div></div>`;
        const cc=(d.change||0)>=0?'pos':'neg', cs=(d.change||0)>=0?'+':'';
        return `<div class="ci">
          <div class="cl2">${k}</div>
          <div class="cp2">${f(d.price)}</div>
          <div class="cc2 ${cc}">${cs}${f(d.change)} (${cs}${f(d.change_pct)}%)</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderCal(cal){
  if(!cal||!cal.length)
    return `<div class="card fw">
      <div class="ct">📅 Macro Kalender</div>
      <div style="color:var(--muted);font-size:13px;padding:8px 0">Keine High-Impact Events gefunden</div>
    </div>`;

  const grouped={};
  cal.forEach(e=>{
    const d=e.date||String(e.time||'').slice(0,10)||'unbekannt';
    if(!grouped[d]) grouped[d]=[];
    grouped[d].push(e);
  });

  const today=new Date().toISOString().slice(0,10);
  let rows='';

  for(const[date,events] of Object.entries(grouped)){
    const isToday  = date===today;
    const labelCol = isToday?'var(--cyan)':'var(--yellow)';
    const labelTxt = isToday?`Heute — ${fmtDate(date)}`:`Nächster Tag — ${fmtDate(date)}`;
    rows+=`<div class="day-label" style="color:${labelCol}">${labelTxt}</div>`;
    rows+=events.map(e=>`
    <div class="cale">
      <span class="cat">${String(e.time||'').slice(11,16)||'—'}</span>
      <span class="can">${e.event}</span>
      <span class="imp-${e.impact==='high'?'high':'medium'}">${e.impact==='high'?'●●':'●'}</span>
      <span class="cac">${e.country}</span>
    </div>`).join('');
  }

  return `<div class="card fw">
    <div class="ct">📅 Macro Kalender — High &amp; Medium Impact</div>
    ${rows}
  </div>`;
}

function fmtDate(d){
  if(!d||d==='unbekannt') return d;
  try{
    return new Date(d).toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
  }catch(e){ return d; }
}

function f(v){
  if(v===null||v===undefined) return '—';
  return typeof v==='number'
    ? v.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})
    : v;
}

load();
</script>
