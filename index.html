<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Trading Floor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div class="nav-inner">
    <div class="nav-brand">✈ The <span>Trading Floor</span></div>
    <div class="nav-links">
      <a href="index.html" class="active">Dashboard</a>
      <a href="journal.html">Journal</a>
      <a href="orders.html">Orders</a>
    </div>
    <div class="nav-time" id="navTime"></div>
  </div>
</nav>

<main>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <p>Lade Marktdaten...</p>
    </div>
  </div>
</main>

<footer>
  The Trading Floor v1.0 &middot; Cockpit Trader &middot; CFD Trading via Vantage &middot; Daten ab 05:00 MEZ
</footer>

<script>
function updateClock(){
  const now=new Date();
  const el=document.getElementById('navTime');
  if(el) el.textContent=now.toLocaleString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
updateClock();setInterval(updateClock,30000);

async function loadData(){
  try{
    const res=await fetch('data.json?t='+Date.now());
    if(!res.ok) throw new Error('data.json nicht gefunden');
    return await res.json();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="loading"><p style="color:var(--red)">'+e.message+'</p></div>';
    return null;
  }
}

function biasClass(label){
  if(!label) return 'bias-neutral';
  const l=label.toUpperCase();
  if(l.includes('BULL')) return 'bias-bull';
  if(l.includes('BEAR')) return 'bias-bear';
  return 'bias-neutral';
}
function chgColor(v){return v>0?'var(--green)':v<0?'var(--red)':'var(--text2)';}
function fmt(n,d){return n!=null?Number(n).toFixed(d??2):'—';}

function render(d){
  if(!d) return;
  const ts=d.timestamp?new Date(d.timestamp).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—';
  const ctx=d.context||{};
  const vix=ctx.VIX||{};
  const dxy=ctx.DXY||{};
  const tnx=ctx.US10Y||{};
  const dax=ctx.DAX||{};
  const macro=d.macro||{};
  const mb=macro.macro_bias||{};
  const fred=macro.fred||{};

  let h='';

  // Header
  h+=`<div class="header">
    <h1>Markt-Dashboard<small>Bias · Levels · Makro-Kontext</small></h1>
    <div class="timestamp">Aktualisiert: ${ts}</div>
  </div>`;

  // Context bar
  h+=`<div class="context-bar">
    <div class="ctx-item"><div class="ctx-label">VIX</div><div class="ctx-value" style="color:${(vix.price||0)>25?'var(--red)':(vix.price||0)>18?'var(--amber)':'var(--green)'}">${fmt(vix.price,1)}</div></div>
    <div class="ctx-item"><div class="ctx-label">DXY</div><div class="ctx-value">${fmt(dxy.price,2)}</div></div>
    <div class="ctx-item"><div class="ctx-label">10Y Yield</div><div class="ctx-value">${fmt(tnx.price,2)}%</div></div>
    <div class="ctx-item"><div class="ctx-label">DAX</div><div class="ctx-value">${fmt(dax.price,0)}</div></div>
    <div class="ctx-item"><div class="ctx-label">Makro</div><div class="ctx-value" style="color:${mb.label==='POSITIV'?'var(--green)':mb.label==='NEGATIV'?'var(--red)':'var(--amber)'}">${mb.label||'—'}</div></div>
    <div class="ctx-item"><div class="ctx-label">Score</div><div class="ctx-value">${mb.score??'—'}</div></div>
  </div>`;

  // Instrument cards
  const inst=d.instruments||{};
  h+=`<div class="section-title">Instrumente</div><div class="bias-grid">`;
  for(const[k,v] of Object.entries(inst)){
    const q=v.quote||{};
    const mp=v.market_profile||{};
    const b=v.bias||{};
    const bc=biasClass(b.bias);
    h+=`<div class="bias-card">
      <div class="card-header">
        <div>
          <div class="symbol">${v.name||k}</div>
          <div class="change" style="color:${chgColor(q.change)}">${q.change>=0?'+':''}${fmt(q.change,2)} (${fmt(q.change_pct,2)}%)</div>
        </div>
        <div style="text-align:right">
          <div class="price">${fmt(q.price,2)}</div>
          <div class="bias-badge ${bc}">${b.bias||'—'} ${b.score||''}</div>
        </div>
      </div>
      <dl class="levels">
        <dt>POC</dt><dd>${fmt(mp.poc,2)}</dd>
        <dt>VAH</dt><dd>${fmt(mp.vah,2)}</dd>
        <dt>VAL</dt><dd>${fmt(mp.val,2)}</dd>
        <dt>VWAP</dt><dd>${fmt(mp.vwap,2)}</dd>
      </dl>
      <div class="mp-shape">Shape: <strong>${mp.shape?mp.shape.name:'—'}</strong>${mp.shape&&mp.shape.description?' — '+mp.shape.description:''}</div>
    </div>`;
  }
  h+=`</div>`;

  // Context details
  h+=`<div class="section-title">Marktkontext</div><div class="macro-grid">`;
  [{t:'VIX',d:vix},{t:'DXY',d:dxy},{t:'10Y Yield',d:tnx},{t:'DAX',d:dax}].forEach(m=>{
    h+=`<div class="macro-card">
      <div class="macro-title">${m.t}</div>
      <div class="macro-value">${fmt(m.d.price,2)}</div>
      <div class="macro-date" style="color:${chgColor(m.d.change_pct)}">${m.d.change_pct!=null?(m.d.change_pct>=0?'+':'')+fmt(m.d.change_pct,2)+'%':''}</div>
    </div>`;
  });
  h+=`</div>`;

  // FRED
  if(Object.keys(fred).length>0){
    h+=`<div class="section-title">FRED Makrodaten</div><div class="macro-grid">`;
    for(const[fk,fv] of Object.entries(fred)){
      if(fv&&typeof fv==='object'&&fv.value!=null){
        h+=`<div class="macro-card">
          <div class="macro-title">${fk}</div>
          <div class="macro-value">${fmt(fv.value,fk==='GDP'?1:2)}</div>
          <div class="macro-date">${fv.date||''} ${fv.unit||''}</div>
        </div>`;
      }
    }
    h+=`</div>`;
  }

  // Calendar
  const cal=d.calendar||[];
  if(cal.length>0){
    h+=`<div class="section-title">Kalender (7 Tage)</div><div class="cal-list">`;
    for(const ev of cal){
      const badge=(ev.type||'').toLowerCase()==='earnings'?'earnings':'fred';
      h+=`<div class="cal-item">
        <span class="cal-badge ${badge}">${ev.type||'EVENT'}</span>
        <span class="cal-date">${ev.date||''}</span>
        <span class="cal-text">${ev.event||ev.title||''}</span>
        ${ev.impact?`<span class="cal-badge" style="background:${ev.impact==='high'?'var(--red-bg)':'var(--amber-bg)'};color:${ev.impact==='high'?'var(--red)':'var(--amber)'}">${ev.impact}</span>`:''}
      </div>`;
    }
    h+=`</div>`;
  }

  document.getElementById('content').innerHTML=h;
}

loadData().then(render);
</script>
</body>
</html>
