<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cockpit-Trader — Morning Briefing</title>
<style>
  :root {
    --bg:#0a0e17;--card:#111827;--border:#1e2a3a;--text:#e2e8f0;
    --muted:#64748b;--green:#22c55e;--red:#ef4444;--yellow:#eab308;
    --blue:#3b82f6;--cyan:#06b6d4;--white:#f1f5f9;--orange:#f97316;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;padding:20px;min-height:100vh;}
  .header{text-align:center;padding:20px 0 30px;border-bottom:1px solid var(--border);margin-bottom:30px;}
  .header h1{font-size:28px;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .header .ts{color:var(--muted);font-size:13px;margin-top:8px;}
  .nav{display:flex;justify-content:center;gap:8px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:30px;}
  .nav a{color:var(--muted);text-decoration:none;padding:8px 20px;font-size:13px;border-radius:8px;border:1px solid var(--border);letter-spacing:1px;transition:all .2s;}
  .nav a.active{color:var(--text);background:rgba(59,130,246,0.15);border-color:var(--blue);}
  .nav a:hover{color:var(--text);border-color:var(--muted);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1400px;margin:0 auto;}
  .fw{grid-column:1/-1;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;}
  .ct{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:16px;}
  /* Bias */
  .bias-wrap{display:flex;align-items:center;gap:24px;padding:10px 0;}
  .tlight{display:flex;flex-direction:column;gap:6px;background:#000;padding:10px 8px;border-radius:20px;border:2px solid #333;}
  .light{width:32px;height:32px;border-radius:50%;background:#1a1a1a;transition:all .3s;}
  .bi{flex:1;}
  .bl{font-size:28px;font-weight:700;letter-spacing:2px;}
  .bs{font-size:14px;color:var(--muted);margin-top:4px;}
  /* Quote */
  .qrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
  .qp{font-size:32px;font-weight:700;}
  .qc{font-size:16px;font-weight:600;}
  .pos{color:var(--green);}.neg{color:var(--red);}
  /* Levels */
  .lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .lb{text-align:center;padding:12px 8px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);}
  .ll{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
  .lv{font-size:18px;font-weight:600;}
  .lpoc .lv{color:var(--cyan);} .lpoc{border-color:var(--cyan);}
  .lvah .lv{color:var(--green);} .lvah{border-color:var(--green);}
  .lval .lv{color:var(--red);} .lval{border-color:var(--red);}
  .lvwap .lv{color:var(--yellow);} .lvwap{border-color:var(--yellow);}
  /* Volume Profile */
  .vpc{width:100%;height:320px;}
  .vpc svg{width:100%;height:100%;}
  /* Shape */
  .sbadge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:14px;font-weight:600;margin-bottom:8px;background:rgba(59,130,246,.15);color:var(--blue);}
  .sdesc{font-size:13px;color:var(--muted);line-height:1.5;}
  /* Signals */
  .slist{list-style:none;}
  .slist li{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;}
  .sdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;}
  .ssc{font-weight:600;min-width:30px;text-align:right;}
  /* Confluence bar */
  .conf-bar-wrap{margin:12px 0 8px;}
  .conf-bar-bg{background:rgba(255,255,255,.06);border-radius:6px;height:10px;overflow:hidden;}
  .conf-bar-fill{height:100%;border-radius:6px;transition:width .6s ease;}
  .conf-label{font-size:12px;color:var(--muted);margin-top:5px;}
  /* Manual checks */
  .manual-checks{margin-top:10px;padding:10px 12px;background:rgba(234,179,8,.06);border:1px solid rgba(234,179,8,.25);border-radius:8px;}
  .manual-checks .mc-title{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--yellow);margin-bottom:6px;}
  .manual-checks ul{list-style:none;}
  .manual-checks li{font-size:12px;color:var(--muted);padding:3px 0;}
  .manual-checks li::before{content:"□ ";color:var(--yellow);}
  /* Context */
  .cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .ci{text-align:center;padding:16px 8px;background:rgba(255,255,255,.02);border-radius:8px;border:1px solid var(--border);}
  .cl2{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .cp2{font-size:20px;font-weight:600;}
  .cc2{font-size:12px;margin-top:4px;}
  /* Calendar */
  .cale{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;align-items:center;}
  .cat{color:var(--cyan);min-width:55px;font-size:12px;}
  .can{flex:1;}
  .cac{color:var(--muted);min-width:30px;text-align:right;font-size:12px;}
  .imp-high{color:var(--red);font-weight:700;}
  .imp-medium{color:var(--yellow);}
  .day-label{padding:10px 0 4px;font-size:12px;letter-spacing:1px;border-top:1px solid var(--border);margin-top:4px;}
  /* Misc */
  .kassa-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;background:rgba(6,182,212,0.15);color:var(--cyan);border:1px solid var(--cyan);margin-left:8px;letter-spacing:1px;vertical-align:middle;}
  .loading{text-align:center;padding:60px;color:var(--muted);}
  /* Orders */
  .order-card{border-radius:8px;padding:10px;margin-top:8px;font-size:13px;}
  /* Age bar */
  #age-bar{margin-top:6px;font-size:12px;display:none;}
  /* Backtest tab */
  .bt-section{margin-bottom:24px;}
  .bt-kpi{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;}
  .bt-kpi-box{text-align:center;padding:16px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.02);}
  .bt-kpi-val{font-size:32px;font-weight:700;margin-bottom:4px;}
  .bt-kpi-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
  .bt-table{width:100%;border-collapse:collapse;font-size:13px;}
  .bt-table th{text-align:left;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:6px 8px;border-bottom:1px solid var(--border);}
  .bt-table td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.04);}
  .bt-bar{display:inline-block;height:8px;border-radius:4px;vertical-align:middle;margin-left:6px;}
  .insight-item{padding:10px 12px;border-left:3px solid var(--cyan);background:rgba(6,182,212,.06);border-radius:0 8px 8px 0;margin-bottom:8px;font-size:13px;line-height:1.5;}
  .no-data{color:var(--muted);font-size:13px;padding:20px 0;text-align:center;}
  @media(max-width:768px){
    .grid{grid-template-columns:1fr;}
    .lgrid{grid-template-columns:repeat(2,1fr);}
    .cgrid{grid-template-columns:repeat(2,1fr);}
    .bt-kpi{grid-template-columns:1fr 1fr;}
  }
</style>

<script>
// ── Tab-Navigation ─────────────────────────────────────────────────────────
function showTab(name, el) {
  document.getElementById('tab-dashboard').style.display = name==='dashboard' ? '' : 'none';
  document.getElementById('tab-backtest').style.display  = name==='backtest'  ? '' : 'none';
  document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');
  if (name === 'backtest') loadBacktest();
}

// ── Data Loading ───────────────────────────────────────────────────────────
let _analysisTs = null;

function fmtAge(ts) {
  const mins = Math.floor((Date.now() - ts.getTime()) / 60000);
  if (mins < 1)  return {txt:'gerade aktualisiert', color:'#22c55e'};
  if (mins < 60) return {txt:`vor ${mins} Min`, color:'#22c55e'};
  const h = Math.floor(mins/60), m = mins%60;
  if (h < 4)  return {txt:`vor ${h}h ${m}min`, color:'#eab308'};
  if (h < 8)  return {txt:`vor ${h}h — bitte neu starten`, color:'#f97316'};
  return             {txt:`${h}h alt — VERALTET`, color:'#ef4444'};
}

function updateAge() {
  if (!_analysisTs) return;
  const {txt, color} = fmtAge(_analysisTs);
  document.getElementById('age-txt').textContent  = txt;
  document.getElementById('age-txt').style.color  = color;
  document.getElementById('age-dot').style.background  = color;
  document.getElementById('age-dot').style.boxShadow   = `0 0 6px ${color}`;
}

function load() {
  if (window.__COCKPIT_DATA__) { render(window.__COCKPIT_DATA__); return; }
  fetch('data.json')
    .then(r => { if (!r.ok) throw new Error('data.json nicht gefunden'); return r.json(); })
    .then(render)
    .catch(e => {
      document.getElementById('dash').innerHTML =
        `<div class="loading fw">❌ ${e.message}<br>
         <small>python cockpit-morning.py ausführen</small></div>`;
    });
}

function render(d) {
  _analysisTs = new Date(d.timestamp);
  document.getElementById('ts').textContent =
    `Pre-Flight Briefing — ${_analysisTs.toLocaleDateString('de-DE')} ` +
    `${_analysisTs.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} Uhr`;
  document.getElementById('age-bar').style.display = 'block';
  updateAge();
  setInterval(updateAge, 60000);

  let html = '';
  // Reihenfolge: Context → Instrumente → Kalender (ganz am Ende)
  html += renderCtx(d.context);

  const insts = (d.journal && d.journal.instruments) || [];
  if (insts.length) {
    insts.forEach(ji => { html += renderInst(ji); });
  } else {
    for (const [k, inst] of Object.entries(d.instruments || {})) {
      if (!inst.error) html += renderInstLegacy(k, inst);
    }
  }

  html += renderCal(d.calendar);
  html += renderFred(d.fred);
  document.getElementById('dash').innerHTML = html;
}

// ── Helpers ────────────────────────────────────────────────────────────────
function f(v, dec=2) {
  if (v === null || v === undefined) return '—';
  return typeof v === 'number'
    ? v.toLocaleString('de-DE', {minimumFractionDigits:dec, maximumFractionDigits:dec})
    : v;
}

function biasColor(c) {
  return c==='green' ? '#22c55e' : c==='red' ? '#ef4444' : '#eab308';
}

function tlight(color) {
  return `<div class="tlight">
    <div class="light" style="${color==='green'?'background:#22c55e;box-shadow:0 0 20px #22c55e':''}"></div>
    <div class="light" style="${color==='yellow'?'background:#eab308;box-shadow:0 0 20px #eab308':''}"></div>
    <div class="light" style="${color==='red'?'background:#ef4444;box-shadow:0 0 20px #ef4444':''}"></div>
  </div>`;
}

function confBar(pct, label) {
  const col = pct >= 70 ? '#22c55e' : pct >= 45 ? '#eab308' : '#ef4444';
  return `<div class="conf-bar-wrap">
    <div class="conf-bar-bg">
      <div class="conf-bar-fill" style="width:${pct}%;background:${col}"></div>
    </div>
    <div class="conf-label">Confluence: <strong style="color:${col}">${label||pct+'%'}</strong></div>
  </div>`;
}

function manualChecks(checks) {
  if (!checks || !checks.length) return '';
  const items = checks.map(c => `<li>${c}</li>`).join('');
  return `<div class="manual-checks">
    <div class="mc-title">✋ Manuell prüfen</div>
    <ul>${items}</ul>
  </div>`;
}

// ── VP Chart ───────────────────────────────────────────────────────────────
function drawVP(mp, currentPrice) {
  if (!mp || !mp.volume_profile || !mp.volume_profile.length)
    return drawVPFromLevels(mp, currentPrice);

  const vps  = mp.volume_profile;
  const maxV = Math.max(...vps.map(b => b.volume));
  const h=320, w=520, bH=h/vps.length, margin=70, rightPad=20;
  const minP = vps[0].price, maxP = vps[vps.length-1].price;
  const priceRange = maxP - minP || 1;
  const p2y = p => h - ((p - minP) / priceRange) * h;
  const tick = (vps[1]?.price - vps[0]?.price) || 1;
  const inRange = currentPrice !== null &&
                  currentPrice >= minP - priceRange*0.3 &&
                  currentPrice <= maxP + priceRange*0.3;

  let bars = '';
  vps.forEach((bin, i) => {
    const bW = maxV > 0 ? (bin.volume / maxV) * (w - margin - rightPad) : 0;
    const y  = h - (i+1) * bH;
    let col = 'rgba(59,130,246,0.4)';
    if (mp.poc && Math.abs(bin.price - mp.poc) < tick * 0.6) col = 'rgba(6,182,212,0.8)';
    else if (mp.vah && mp.val && bin.price >= mp.val && bin.price <= mp.vah) col = 'rgba(59,130,246,0.6)';
    bars += `<rect x="${margin}" y="${y}" width="${bW}" height="${bH-1}" fill="${col}" rx="2"/>`;
    if (i % 4 === 0)
      bars += `<text x="${margin-6}" y="${y+bH/2+4}" text-anchor="end" fill="#64748b" font-size="10" font-family="monospace">${bin.price.toFixed(0)}</text>`;
  });

  if (mp.poc) {
    const y = p2y(mp.poc);
    bars += `<line x1="${margin}" y1="${y}" x2="${w}" y2="${y}" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,3"/>`;
    bars += `<text x="${w-4}" y="${y-4}" text-anchor="end" fill="#06b6d4" font-size="11" font-family="monospace">POC ${mp.poc}</text>`;
  }
  if (mp.vah) {
    const y = p2y(mp.vah);
    bars += `<line x1="${margin}" y1="${y}" x2="${w}" y2="${y}" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4"/>`;
    bars += `<text x="${w-4}" y="${y-4}" text-anchor="end" fill="#22c55e" font-size="10" font-family="monospace">VAH ${mp.vah}</text>`;
  }
  if (mp.val) {
    const y = p2y(mp.val);
    bars += `<line x1="${margin}" y1="${y}" x2="${w}" y2="${y}" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4"/>`;
    bars += `<text x="${w-4}" y="${y+14}" text-anchor="end" fill="#ef4444" font-size="10" font-family="monospace">VAL ${mp.val}</text>`;
  }
  if (inRange) {
    const y = p2y(currentPrice);
    bars += `<line x1="${margin}" y1="${y}" x2="${w-100}" y2="${y}" stroke="#f1f5f9" stroke-width="2"/>`;
    bars += `<polygon points="${w-102},${y-5} ${w-92},${y} ${w-102},${y+5}" fill="#f1f5f9"/>`;
    bars += `<rect x="${margin}" y="${y-9}" width="92" height="18" fill="rgba(241,245,249,0.15)" rx="3"/>`;
    bars += `<text x="${margin+4}" y="${y+5}" fill="#f1f5f9" font-size="11" font-family="monospace" font-weight="bold">▶ ${currentPrice.toFixed(2)}</text>`;
    bars += `<text x="${w-4}" y="${y+5}" text-anchor="end" fill="#f1f5f9" font-size="11" font-family="monospace" font-weight="bold">${currentPrice.toFixed(2)}</text>`;
  } else if (currentPrice !== null) {
    const above = currentPrice > maxP;
    bars += `<text x="${margin+4}" y="${above?16:h-6}" fill="#f1f5f9" font-size="12" font-family="monospace">${above?'▲':'▼'} Kurs ${currentPrice.toFixed(2)} (ausserhalb Range)</text>`;
  }

  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`;
}

function drawVPFromLevels(mp, currentPrice) {
  if (!mp || !mp.poc)
    return '<div style="text-align:center;color:var(--muted);padding:40px">Kein Volume Profile verfügbar</div>';
  const h=200, w=520, margin=80, rightPad=20;
  const levels = [
    {label:'VAH',  price:mp.vah,  color:'#22c55e'},
    {label:'POC',  price:mp.poc,  color:'#06b6d4'},
    {label:'VWAP', price:mp.vwap, color:'#eab308'},
    {label:'VAL',  price:mp.val,  color:'#ef4444'},
  ].filter(l => l.price != null).sort((a,b) => b.price - a.price);
  if (currentPrice) levels.push({label:'Kurs', price:currentPrice, color:'#f1f5f9', bold:true});
  const allPrices = levels.map(l => l.price);
  const minP = Math.min(...allPrices), maxP = Math.max(...allPrices);
  const range = maxP - minP || 1;
  const p2y = p => 10 + (1 - (p - minP) / range) * (h - 20);
  let lines = '';
  levels.forEach(l => {
    const y   = p2y(l.price);
    const dash = l.bold ? '' : ' stroke-dasharray="6,3"';
    const sw   = l.bold ? 2.5 : 1.5;
    lines += `<line x1="${margin}" y1="${y}" x2="${w-rightPad}" y2="${y}" stroke="${l.color}" stroke-width="${sw}"${dash}/>`;
    lines += `<text x="${margin-6}" y="${y+4}" text-anchor="end" fill="${l.color}" font-size="11" font-family="monospace"${l.bold?' font-weight="bold"':''}>${l.price.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})}</text>`;
    lines += `<text x="${w-rightPad+4}" y="${y+4}" fill="${l.color}" font-size="10" font-family="monospace">${l.label}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}">${lines}</svg>`;
}

// ── Context & Calendar ─────────────────────────────────────────────────────
function renderCtx(ctx) {
  if (!ctx) return '';
  return `<div class="card fw">
    <div class="ct">🌍 Macro Context</div>
    <div class="cgrid">
      ${['VIX','DXY','US10Y','DAX'].map(k => {
        const d = ctx[k];
        if (!d) return `<div class="ci"><div class="cl2">${k}</div><div class="cp2">—</div></div>`;
        const cc = (d.change||0)>=0?'pos':'neg', cs=(d.change||0)>=0?'+':'';
        return `<div class="ci">
          <div class="cl2">${k}</div>
          <div class="cp2">${f(d.price)}</div>
          <div class="cc2 ${cc}">${cs}${f(d.change)} (${cs}${f(d.change_pct)}%)</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function fmtDate(d) {
  try { return new Date(d).toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'}); }
  catch(e) { return d; }
}

function renderCal(cal) {
  // Nur US und DE, nur high impact — als zweite Filterlinie (erste ist in cockpit-morning.py)
  const filtered = (cal || []).filter(e =>
    e.impact === 'high' &&
    ['US','DE'].includes((e.country||'').toUpperCase())
  );
  const flagMap = {'US':'🇺🇸','DE':'🇩🇪'};

  if (!filtered.length)
    return `<div class="card fw"><div class="ct">📅 Macro Kalender — US &amp; DE High Impact</div>
      <div style="color:var(--muted);font-size:13px;padding:12px 0;text-align:center">
        Keine High-Impact Events für US/DE
      </div></div>`;

  const grouped = {};
  filtered.forEach(e => {
    const d = e.date || String(e.time||'').slice(0,10) || 'unbekannt';
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(e);
  });

  const today = new Date().toISOString().slice(0,10);
  let rows = '';
  for (const [date, events] of Object.entries(grouped)) {
    const isToday = date === today;
    rows += `<div class="day-label" style="color:${isToday?'var(--cyan)':'var(--yellow)'}">
      ${isToday?'Heute':'Nächster Tag'} — ${fmtDate(date)}
    </div>`;
    rows += events.map(e => `
    <div class="cale">
      <span class="cat">${String(e.time||'').slice(11,16)||'—'}</span>
      <span class="can">${e.event}</span>
      <span class="imp-high">●●</span>
      <span class="cac">${flagMap[e.country]||''} ${e.country}</span>
    </div>`).join('');
  }
  return `<div class="card fw">
    <div class="ct">📅 Macro Kalender — US &amp; DE · High Impact only</div>
    ${rows}
  </div>`;
}

// ── FRED Macro Data ───────────────────────────────────────────────────────
function renderFred(fred) {
  const series = [
    { id:'FEDFUNDS', icon:'🏦', label:'Fed Funds Rate',    warn_high:5.0, warn_low:2.0, invert:true  },
    { id:'T10Y2Y',   icon:'📐', label:'Yield Curve 10Y-2Y', warn_high:0.5, warn_low:-0.5, invert:true },
    { id:'CPIAUCSL', icon:'🛒', label:'CPI Inflation',      warn_high:4.0, warn_low:2.0, invert:true  },
    { id:'UNRATE',   icon:'👷', label:'Arbeitslosenquote',  warn_high:5.0, warn_low:3.5, invert:false },
  ];

  if (!fred || !Object.keys(fred).length)
    return `<div class="card fw">
      <div class="ct">📊 FRED Macro — US Federal Reserve Data</div>
      <div style="color:var(--muted);font-size:13px;padding:12px 0;text-align:center">
        FRED-Daten nicht verfuegbar — FRED_API_KEY pruefen
      </div></div>`;

  // Kacheln
  const tiles = series.map(s => {
    const d = fred[s.id];
    if (!d) return `<div class="ci"><div class="cl2">${s.icon} ${s.label}</div><div class="cp2">—</div></div>`;
    const chg    = d.change || 0;
    const chgCol = chg === 0 ? 'var(--muted)' : (
      s.invert
        ? (chg < 0 ? 'var(--green)' : 'var(--red)')
        : (chg > 0 ? 'var(--green)' : 'var(--red)')
    );
    // Ampel-Farbe fuer den Wert
    let valCol = 'var(--text)';
    if (s.id === 'T10Y2Y') {
      valCol = d.value < -0.5 ? 'var(--red)' : d.value < 0 ? 'var(--yellow)' : 'var(--green)';
    } else if (s.id === 'UNRATE') {
      valCol = d.value < 4.0 ? 'var(--green)' : d.value > 5.0 ? 'var(--red)' : 'var(--yellow)';
    } else {
      valCol = d.value > s.warn_high ? 'var(--red)' : d.value < s.warn_low ? 'var(--green)' : 'var(--yellow)';
    }
    return `<div class="ci">
      <div class="cl2">${s.icon} ${s.label}</div>
      <div class="cp2" style="color:${valCol}">${d.value}${d.unit||'%'}</div>
      <div class="cc2" style="color:${chgCol}">${chg >= 0 ? '+' : ''}${chg} vs Vormonat</div>
      <div style="font-size:10px;color:var(--muted);margin-top:3px">${d.date||''}</div>
    </div>`;
  }).join('');

  // Detail-Tabelle
  const rows = series.map(s => {
    const d = fred[s.id];
    if (!d) return '';
    const chg    = d.change || 0;
    const chgCol = chg === 0 ? 'var(--muted)' :
      (s.invert ? (chg < 0 ? 'var(--green)' : 'var(--red)') : (chg > 0 ? 'var(--green)' : 'var(--red)'));

    // Bias-Einschätzung
    let bias = '—', biasCol = 'var(--muted)';
    if (s.id === 'FEDFUNDS') {
      if      (d.value > 5.0) { bias='Restriktiv';    biasCol='var(--red)';    }
      else if (d.value > 4.0) { bias='Erhoeht';       biasCol='var(--yellow)'; }
      else if (d.value < 2.0) { bias='Akkommodativ';  biasCol='var(--green)';  }
      else if (chg < 0)       { bias='Sinkend ↓';     biasCol='var(--green)';  }
      else if (chg > 0)       { bias='Steigend ↑';    biasCol='var(--red)';    }
      else                    { bias='Stabil';         biasCol='var(--muted)';  }
    } else if (s.id === 'T10Y2Y') {
      if      (d.value < -0.5) { bias='Stark inv. ⚠'; biasCol='var(--red)';    }
      else if (d.value < 0)    { bias='Invertiert';   biasCol='var(--yellow)'; }
      else if (d.value > 0.5)  { bias='Positiv ✓';   biasCol='var(--green)';  }
      else                     { bias='Flach';         biasCol='var(--muted)';  }
    } else if (s.id === 'CPIAUCSL') {
      if      (d.value > 4.0) { bias='Hoch ⚠';       biasCol='var(--red)';    }
      else if (d.value > 3.0) { bias='Erhoeht';       biasCol='var(--yellow)'; }
      else if (d.value < 2.5) { bias='Nahe Ziel ✓';  biasCol='var(--green)';  }
      else                    { bias='Moderat';        biasCol='var(--muted)';  }
    } else if (s.id === 'UNRATE') {
      if      (d.value < 4.0) { bias='Stark ✓';      biasCol='var(--green)';  }
      else if (d.value > 5.0) { bias='Schwach ⚠';    biasCol='var(--red)';    }
      else                    { bias='Normal';         biasCol='var(--muted)';  }
    }

    return `<div style="display:flex;justify-content:space-between;align-items:center;
      padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:13px;">
      <span style="color:var(--muted);min-width:160px">${s.icon} ${s.label}</span>
      <span style="font-weight:600;min-width:80px">${d.value}${d.unit||'%'}</span>
      <span style="color:${chgCol};min-width:80px">${chg >= 0 ? '+' : ''}${chg}</span>
      <span style="color:${biasCol};font-weight:600">${bias}</span>
    </div>`;
  }).join('');

  return `<div class="card fw">
    <div class="ct">📊 FRED Macro — US Federal Reserve Data</div>
    <div class="cgrid" style="margin-bottom:16px">${tiles}</div>
    <div style="border-top:1px solid var(--border);padding-top:12px">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">
        Detail — Wert / Veraenderung / Einschaetzung
      </div>
      ${rows}
    </div>
  </div>`;
}

// ── Backtest Tab ───────────────────────────────────────────────────────────
function loadBacktest() {
  fetch('snapshots/backtest-report.json')
    .then(r => { if (!r.ok) throw new Error('Noch kein Report'); return r.json(); })
    .then(renderBacktest)
    .catch(() => {
      document.getElementById('bt-content').innerHTML =
        `<div class="no-data">
          Noch kein Backtest-Report vorhanden.<br>
          <code style="display:block;margin-top:8px;font-size:12px">python backtest-collector.py</code>
        </div>`;
    });
}

function renderBacktest(r) {
  const wrong = r.total_signals - r.total_correct - r.total_partial;
  const pctCol = p => p >= 60 ? '#22c55e' : p >= 45 ? '#eab308' : '#ef4444';

  // KPI
  const kpiHtml = `
  <div class="bt-kpi">
    <div class="bt-kpi-box">
      <div class="bt-kpi-val" style="color:${pctCol(r.overall_pct)}">${r.overall_pct}%</div>
      <div class="bt-kpi-lbl">Trefferquote</div>
    </div>
    <div class="bt-kpi-box">
      <div class="bt-kpi-val">${r.total_signals}</div>
      <div class="bt-kpi-lbl">Signale gesamt</div>
    </div>
    <div class="bt-kpi-box">
      <div class="bt-kpi-val" style="color:#22c55e">${r.total_correct}</div>
      <div class="bt-kpi-lbl">✅ Korrekt</div>
    </div>
  </div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:20px">
    ⚡ Partial: ${r.total_partial} &nbsp;|&nbsp; ❌ Falsch: ${wrong}
    &nbsp;|&nbsp; Zeitraum: ${r.snapshots_used} Handelstage
    &nbsp;|&nbsp; Stand: ${(r.generated_at||'').slice(0,16)}
  </div>`;

  // Tabellen-Builder
  function tableOf(data, title) {
    if (!data || !Object.keys(data).length) return '';
    const rows = Object.entries(data).map(([k, v]) => {
      const barW = Math.round(v.pct * 1.4);
      const col  = pctCol(v.pct);
      return `<tr>
        <td>${k}</td>
        <td><strong style="color:${col}">${v.pct}%</strong>
          <span class="bt-bar" style="width:${barW}px;background:${col}"></span></td>
        <td style="color:var(--muted)">${v.correct}/${v.total}</td>
      </tr>`;
    }).join('');
    return `
    <div class="bt-section card">
      <div class="ct">${title}</div>
      <table class="bt-table">
        <thead><tr><th>Kategorie</th><th>Trefferquote</th><th>n</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  // Wochenverlauf
  let weekHtml = '';
  if (r.by_week && Object.keys(r.by_week).length) {
    const rows = Object.entries(r.by_week).map(([k, v]) => {
      const col = pctCol(v.pct);
      const barW = Math.round(v.pct * 1.4);
      return `<tr>
        <td>${k}</td>
        <td><strong style="color:${col}">${v.pct}%</strong>
          <span class="bt-bar" style="width:${barW}px;background:${col}"></span></td>
        <td style="color:var(--muted)">${v.correct}/${v.total}</td>
      </tr>`;
    }).join('');
    weekHtml = `
    <div class="bt-section card">
      <div class="ct">📅 Wochenverlauf</div>
      <table class="bt-table">
        <thead><tr><th>Woche</th><th>Trefferquote</th><th>n</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  // Erkenntnisse
  const insightsHtml = (r.insights || []).length
    ? `<div class="bt-section card">
        <div class="ct">💡 Erkenntnisse</div>
        ${r.insights.map(i => `<div class="insight-item">${i}</div>`).join('')}
       </div>`
    : '';

  document.getElementById('bt-content').innerHTML = `
  <div style="max-width:1400px;margin:0 auto">
    ${kpiHtml}
    <div class="grid">
      ${tableOf(r.by_instrument, '📈 Nach Instrument')}
      ${tableOf(r.by_bias,       '🎯 Nach Bias')}
      ${tableOf(r.by_confluence, '🔗 Confluence-Tier')}
      ${tableOf(r.by_shape,      '📐 Nach Shape')}
    </div>
    ${weekHtml}
    ${insightsHtml}
  </div>`;
}

// ── Start ──────────────────────────────────────────────────────────────────
load();
</script>
</body>
</html>
