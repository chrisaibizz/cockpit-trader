<style>
:root{--bg:#0a0e17;--card:#111827;--border:#1e2a3a;--text:#e2e8f0;--muted:#64748b;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--blue:#3b82f6;--cyan:#06b6d4;--white:#f1f5f9;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code',monospace;min-height:100vh;}
.header{text-align:center;padding:20px 20px 14px;border-bottom:1px solid var(--border);}
.header h1{font-size:22px;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header .ts{color:var(--muted);font-size:12px;margin-top:5px;}
#age-bar{margin-top:4px;font-size:11px;display:none;}
.nav{display:flex;justify-content:center;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);}
.nav a{color:var(--muted);text-decoration:none;padding:6px 16px;font-size:12px;border-radius:6px;border:1px solid var(--border);letter-spacing:1px;transition:all .2s;}
.nav a.active{color:var(--text);background:rgba(59,130,246,0.15);border-color:var(--blue);}
.nav a:hover{color:var(--text);border-color:var(--muted);}
.main{max-width:1400px;margin:0 auto;padding:20px;}
/* MACRO BLOCK */
.macro-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:18px;}
.macro-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.macro-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.score-pill{display:flex;align-items:center;gap:8px;}
.score-num{font-size:18px;font-weight:700;}
.score-lbl{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:600;letter-spacing:1px;}
.sg{color:var(--green);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);}
.sy{color:var(--yellow);background:rgba(234,179,8,.1);border:1px solid rgba(234,179,8,.3);}
.sr{color:var(--red);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);}
.macro-row{display:flex;flex-wrap:wrap;gap:4px 14px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.05);margin-bottom:8px;}
.mi{display:flex;align-items:center;gap:5px;font-size:12px;}
.mk{color:var(--muted);min-width:38px;}
.mv{font-weight:600;}
.up{color:var(--green);}.down{color:var(--red);}.flat{color:var(--muted);}
.fred-row{display:flex;flex-wrap:wrap;gap:4px 14px;}
.fi{display:flex;align-items:center;gap:5px;font-size:11px;}
.fd{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
/* INSTRUMENTS */
.instruments{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.irow{display:grid;grid-template-columns:200px 1fr;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.iinfo{padding:14px;border-right:1px solid var(--border);}
.iname{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:6px;}
.iprice{font-size:22px;font-weight:700;margin-bottom:2px;}
.ichg{font-size:12px;margin-bottom:8px;}
.ibias{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.tl{display:flex;flex-direction:column;gap:3px;background:#000;padding:5px 4px;border-radius:12px;border:1px solid #333;}
.lb{width:9px;height:9px;border-radius:50%;background:#1a1a1a;}
.bt{font-size:15px;font-weight:700;letter-spacing:1px;}
.cn{font-size:11px;color:var(--muted);}
.cb{margin:5px 0 3px;}
.cb-bg{background:rgba(255,255,255,.06);border-radius:4px;height:4px;overflow:hidden;}
.cb-f{height:100%;border-radius:4px;}
.ishp{font-size:10px;color:var(--muted);margin-top:3px;}
/* CHART */
.ichart{padding:10px 14px;min-width:0;}
.ct-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-wrap:wrap;gap:4px;}
.ct-left{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.ct-name{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.leg{font-size:10px;}
.ct-ts{font-size:10px;color:var(--muted);}
.vpc{width:100%;height:240px;}
.vpc svg{width:100%;height:100%;}
/* CALENDAR */
.cal-block{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;}
.cal-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px;}
.cale{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;align-items:center;}
.cat{color:var(--cyan);min-width:50px;font-size:11px;}
.can{flex:1;}
.imp-high{color:var(--red);font-weight:700;}
.day-lbl{padding:7px 0 2px;font-size:11px;color:var(--muted);}
.loading{text-align:center;padding:60px;color:var(--muted);}
@media(max-width:900px){.instruments{grid-template-columns:1fr;}.irow{grid-template-columns:1fr;}.iinfo{border-right:none;border-bottom:1px solid var(--border);}}
@media(max-width:600px){.main{padding:12px;}.header h1{font-size:18px;}}
</style>
</head>

function renderMacro(ctx,fred){
  var ms=calcMacroScore(ctx,fred);
  function ci(key){var d=ctx&&ctx[key];if(!d)return{v:'—',c:'flat',a:''};var c=d.change_pct>0.2?'up':d.change_pct<-0.2?'down':'flat',a=d.change_pct>0.2?'↑':d.change_pct<-0.2?'↓':'';return{v:f(d.price,2),c:c,a:a};}
  var vix=ci('VIX'),dxy=ci('DXY'),b10=ci('US10Y');
  var fItems=[
    {k:'Fed',v:fred&&fred.FEDFUNDS&&fred.FEDFUNDS.value!=null?f(fred.FEDFUNDS.value,2)+'%':'—',d:fred&&fred.FEDFUNDS&&fred.FEDFUNDS.value<=4.0?'#22c55e':fred&&fred.FEDFUNDS&&fred.FEDFUNDS.value<=5.0?'#eab308':'#ef4444'},
    {k:'CPI',v:fred&&fred.CPIAUCSL&&fred.CPIAUCSL.value!=null?f(fred.CPIAUCSL.value,2)+'%':'—',d:fred&&fred.CPIAUCSL&&fred.CPIAUCSL.value<2.5?'#22c55e':fred&&fred.CPIAUCSL&&fred.CPIAUCSL.value<3.5?'#eab308':'#ef4444'},
    {k:'YC 10Y-2Y',v:fred&&fred.T10Y2Y&&fred.T10Y2Y.value!=null?f(fred.T10Y2Y.value,2)+'%':'—',d:fred&&fred.T10Y2Y&&fred.T10Y2Y.value>0.3?'#22c55e':fred&&fred.T10Y2Y&&fred.T10Y2Y.value>0?'#eab308':'#ef4444'},
    {k:'U-Rate',v:fred&&fred.UNRATE&&fred.UNRATE.value!=null?f(fred.UNRATE.value,2)+'%':'—',d:fred&&fred.UNRATE&&fred.UNRATE.value<4.5?'#22c55e':fred&&fred.UNRATE&&fred.UNRATE.value<5.5?'#eab308':'#ef4444'},
  ];
  return '<div class="macro-block">'+
    '<div class="macro-header">'+
      '<span class="macro-title">🌍 Makro &amp; Sentiment</span>'+
      '<div class="score-pill"><span class="score-num '+ms.cls+'">'+ms.s+'/'+ms.t+'</span><span class="score-lbl '+ms.cls+'">'+ms.lbl+'</span></div>'+
    '</div>'+
    '<div class="macro-row">'+
      '<div class="mi"><span class="mk">VIX</span><span class="mv '+vix.c+'">'+vix.v+'</span><span class="'+vix.c+'" style="font-size:10px">'+vix.a+'</span></div>'+
      '<div class="mi"><span class="mk">DXY</span><span class="mv '+dxy.c+'">'+dxy.v+'</span><span class="'+dxy.c+'" style="font-size:10px">'+dxy.a+'</span></div>'+
      '<div class="mi"><span class="mk">10Y</span><span class="mv '+b10.c+'">'+b10.v+'%</span><span class="'+b10.c+'" style="font-size:10px">'+b10.a+'</span></div>'+
    '</div>'+
    '<div class="fred-row">'+fItems.map(function(fi){return '<div class="fi"><span class="fd" style="background:'+fi.d+'"></span><span style="color:var(--muted)">'+fi.k+'</span><span class="mv">'+fi.v+'</span></div>';}).join('')+'</div>'+
  '</div>';
}

function tl(color){
  return '<div class="tl">'+
    '<div class="lb" style="'+(color==='green'?'background:#22c55e;box-shadow:0 0 10px #22c55e':'')+'"></div>'+
    '<div class="lb" style="'+(color==='yellow'?'background:#eab308;box-shadow:0 0 10px #eab308':'')+'"></div>'+
    '<div class="lb" style="'+(color==='red'?'background:#ef4444;box-shadow:0 0 10px #ef4444':'')+'"></div>'+
  '</div>';
}

function renderInstRow(ji){
  var mp=ji.market_profile||{},q=ji.quote||{},color=ji.bias_color||'yellow';
  var gc=color==='green'?'#22c55e':color==='red'?'#ef4444':'#eab308';
  var cc=(q.change_pct||0)>=0?'up':'down',cs=(q.change_pct||0)>=0?'+':'';
  var cp=ji.confluence_pct||0,cl=ji.confluence_label||'—';
  var cc2=cp>=70?'#22c55e':cp>=45?'#eab308':'#ef4444';
  var tsStr=_ts?'Stand: '+fmtTs(_ts.toISOString()):'';
  var price=q.price||ji.current_price;
  return '<div class="irow">'+
    '<div class="iinfo">'+
      '<div class="iname">'+( ji.name||'—')+'</div>'+
      '<div class="iprice">'+f(q.price)+'</div>'+
      '<div class="ichg '+cc+'">'+cs+f(q.change_pct)+'%</div>'+
      '<div class="ibias">'+tl(color)+'<div><div class="bt" style="color:'+gc+'">'+(ji.bias||'—')+'</div><div class="cn">Score: <strong style="color:'+cc2+'">'+(cl)+'</strong></div></div></div>'+
      '<div class="cb"><div class="cb-bg"><div class="cb-f" style="width:'+cp+'%;background:'+cc2+'"></div></div></div>'+
      '<div class="ishp">'+(ji.mp_shape_yesterday||ji.market_profile&&ji.market_profile.shape&&ji.market_profile.shape.name||'')+'</div>'+
    '</div>'+
    '<div class="ichart">'+
      '<div class="ct-row">'+
        '<div class="ct-left">'+
          '<span class="ct-name">LEVELS CHART — '+(ji.name||'')+'</span>'+
          '<span class="leg" style="color:#f1f5f9">-- KURS</span>'+
          '<span class="leg" style="color:#06b6d4">-- POC</span>'+
          '<span class="leg" style="color:#22c55e">-- VAH</span>'+
          '<span class="leg" style="color:#ef4444">-- VAL</span>'+
        '</div>'+
        '<span class="ct-ts">'+tsStr+'</span>'+
      '</div>'+
      '<div class="vpc">'+drawVP(mp,price)+'</div>'+
    '</div>'+
  '</div>';
}

function drawVP(mp,currentPrice){
  if(!mp||!mp.volume_profile||!mp.volume_profile.length)return drawVPFallback(mp,currentPrice);
  var vps=mp.volume_profile,maxV=Math.max.apply(null,vps.map(function(b){return b.volume;}));
  var h=240,w=520,bH=h/vps.length,margin=70,rightPad=20;
  var minP=vps[0].price,maxP=vps[vps.length-1].price,priceRange=maxP-minP||1;
  var p2y=function(p){return h-((p-minP)/priceRange)*h;};
  var tick=(vps[1]&&vps[1].price-vps[0].price)||1;
  var inRange=currentPrice!==null&&currentPrice>=minP-priceRange*0.3&&currentPrice<=maxP+priceRange*0.3;
  var bars='';
  vps.forEach(function(bin,i){
    var bW=maxV>0?(bin.volume/maxV)*(w-margin-rightPad):0,y=h-(i+1)*bH;
    var col='rgba(59,130,246,0.4)';
    if(mp.poc&&Math.abs(bin.price-mp.poc)<tick*0.6)col='rgba(6,182,212,0.8)';
    else if(mp.vah&&mp.val&&bin.price>=mp.val&&bin.price<=mp.vah)col='rgba(59,130,246,0.6)';
    bars+='<rect x="'+margin+'" y="'+y+'" width="'+bW+'" height="'+(bH-1)+'" fill="'+col+'" rx="2"/>';
    if(i%4===0)bars+='<text x="'+(margin-6)+'" y="'+(y+bH/2+4)+'" text-anchor="end" fill="#64748b" font-size="10" font-family="monospace">'+bin.price.toFixed(0)+'</text>';
  });
  if(mp.poc){var y=p2y(mp.poc);bars+='<line x1="'+margin+'" y1="'+y+'" x2="'+w+'" y2="'+y+'" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,3"/><text x="'+(w-4)+'" y="'+(y-4)+'" text-anchor="end" fill="#06b6d4" font-size="11" font-family="monospace">POC '+mp.poc+'</text>';}
  if(mp.vah){var y=p2y(mp.vah);bars+='<line x1="'+margin+'" y1="'+y+'" x2="'+w+'" y2="'+y+'" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,4"/><text x="'+(w-4)+'" y="'+(y-4)+'" text-anchor="end" fill="#22c55e" font-size="10" font-family="monospace">VAH '+mp.vah+'</text>';}
  if(mp.val){var y=p2y(mp.val);bars+='<line x1="'+margin+'" y1="'+y+'" x2="'+w+'" y2="'+y+'" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4"/><text x="'+(w-4)+'" y="'+(y+14)+'" text-anchor="end" fill="#ef4444" font-size="10" font-family="monospace">VAL '+mp.val+'</text>';}
  if(inRange){var y=p2y(currentPrice);bars+='<line x1="'+margin+'" y1="'+y+'" x2="'+(w-100)+'" y2="'+y+'" stroke="#f1f5f9" stroke-width="2"/><polygon points="'+(w-102)+','+(y-5)+' '+(w-92)+','+y+' '+(w-102)+','+(y+5)+'" fill="#f1f5f9"/><rect x="'+margin+'" y="'+(y-9)+'" width="92" height="18" fill="rgba(241,245,249,0.15)" rx="3"/><text x="'+(margin+4)+'" y="'+(y+5)+'" fill="#f1f5f9" font-size="11" font-family="monospace" font-weight="bold">▶ '+currentPrice.toFixed(2)+'</text><text x="'+(w-4)+'" y="'+(y+5)+'" text-anchor="end" fill="#f1f5f9" font-size="11" font-family="monospace" font-weight="bold">'+currentPrice.toFixed(2)+'</text>';}
  else if(currentPrice!==null){var above=currentPrice>maxP;bars+='<text x="'+(margin+4)+'" y="'+(above?16:h-6)+'" fill="#f1f5f9" font-size="12" font-family="monospace">'+(above?'▲':'▼')+' Kurs '+currentPrice.toFixed(2)+' (ausserhalb Range)</text>';}
  return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="xMidYMid meet">'+bars+'</svg>';
}

function drawVPFallback(mp,currentPrice){
  if(!mp||!mp.poc)return '<div style="text-align:center;color:var(--muted);padding:20px">Kein Volume Profile</div>';
  var h=200,w=520,margin=80,rightPad=20;
  var levels=[{label:'VAH',price:mp.vah,color:'#22c55e'},{label:'POC',price:mp.poc,color:'#06b6d4'},{label:'VWAP',price:mp.vwap,color:'#eab308'},{label:'VAL',price:mp.val,color:'#ef4444'}].filter(function(l){return l.price!=null;}).sort(function(a,b){return b.price-a.price;});
  if(currentPrice)levels.push({label:'Kurs',price:currentPrice,color:'#f1f5f9',bold:true});
  var allP=levels.map(function(l){return l.price;}),minP=Math.min.apply(null,allP),maxP=Math.max.apply(null,allP),range=maxP-minP||1;
  var p2y=function(p){return 10+(1-(p-minP)/range)*(h-20);};
  var lines='';
  levels.forEach(function(l){var y=p2y(l.price),dash=l.bold?'':' stroke-dasharray="6,3"',sw=l.bold?2.5:1.5;lines+='<line x1="'+margin+'" y1="'+y+'" x2="'+(w-rightPad)+'" y2="'+y+'" stroke="'+l.color+'" stroke-width="'+sw+'"'+dash+'/><text x="'+(margin-6)+'" y="'+(y+4)+'" text-anchor="end" fill="'+l.color+'" font-size="11" font-family="monospace"'+(l.bold?' font-weight="bold"':'')+'>'+l.price.toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+'</text><text x="'+(w-rightPad+4)+'" y="'+(y+4)+'" fill="'+l.color+'" font-size="10" font-family="monospace">'+l.label+'</text>';});
  return '<svg viewBox="0 0 '+w+' '+h+'">'+lines+'</svg>';
}

function renderCal(cal){
  var filtered=(cal||[]).filter(function(e){return e.impact==='high'&&['US','DE'].includes((e.country||'').toUpperCase());});
  if(!filtered.length)return '<div class="cal-block"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span class="cal-title" style="margin-bottom:0">📅 Makro Kalender</span><span class="ct-ts">'+(_ts?'Stand: '+fmtTs(_ts.toISOString()):'')+'</span></div><div style="color:var(--muted);font-size:12px;padding:8px 0;text-align:center">Keine High-Impact Events</div></div>';
  var byDay={};
  filtered.forEach(function(e){var d=e.date||String(e.time||'').slice(0,10)||'';if(!byDay[d])byDay[d]=[];byDay[d].push(e);});
  var rows='';
  Object.keys(byDay).forEach(function(day){
    var evts=byDay[day],d=new Date(day),dl=isNaN(d)?day:d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
    rows+='<div class="day-lbl">'+dl+'</div>';
    evts.forEach(function(e){rows+='<div class="cale"><span class="cat">'+String(e.time||'').slice(11,16)+'</span><span class="can">'+e.event+'</span><span class="imp-high">'+e.country+'</span></div>';});
  });
  return '<div class="cal-block"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span class="cal-title" style="margin-bottom:0">📅 Makro Kalender — High Impact</span><span class="ct-ts">'+(_ts?'Stand: '+fmtTs(_ts.toISOString()):'')+'</span></div>'+rows+'</div>';
}

function render(d){
  _ts=new Date(d.timestamp);
  document.getElementById('ts').textContent='Pre-Flight Briefing — '+_ts.toLocaleDateString('de-DE')+' '+_ts.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr';
  document.title='Cockpit-Trader — '+_ts.toLocaleDateString('de-DE');
  document.getElementById('age-bar').style.display='block';
  updateAge();setInterval(updateAge,60000);

  var html='';
  html+=renderMacro(d.context,d.fred);
  html+=renderCal(d.calendar);
  var insts=(d.journal&&d.journal.instruments)||[];
  html+='<div class="instruments">';
  if(insts.length){
    insts.forEach(function(ji){html+=renderInstRow(ji);});
  } else {
    Object.keys(d.instruments||{}).forEach(function(k){
      var inst=d.instruments[k];
      if(!inst.error){
        html+=renderInstRow({name:inst.name||k,bias:inst.bias&&inst.bias.bias||'—',bias_color:inst.bias&&inst.bias.color||'yellow',confluence_pct:inst.bias&&inst.bias.confluence_pct||0,confluence_label:inst.bias&&inst.bias.confluence_label||'—',quote:inst.quote||{},market_profile:inst.market_profile||{},current_price:inst.current_price,mp_shape_yesterday:inst.market_profile&&inst.market_profile.shape&&inst.market_profile.shape.name||''});
      }
    });
  }
  html+='</div>';
  document.getElementById('dash').innerHTML=html;
}

function load(){
  // fetch state.json zuerst (GitHub Pages - immer aktuell)
  fetch('state.json?t='+Date.now())
    .then(function(r){if(!r.ok)throw new Error();return r.json();})
    .then(function(s){
      // state.json in dashboard-kompatibles Format umwandeln
      if(s.market&&s.analysis){renderFromState(s);return;}
      throw new Error('state.json kein Dashboard-Format');
    })
    .catch(function(){
      // Fallback 1: data.json
      fetch('data.json?t='+Date.now())
        .then(function(r){if(!r.ok)throw new Error('data.json nicht gefunden');return r.json();})
        .then(render)
        .catch(function(){
          // Fallback 2: eingebettete Daten (lokal)
          if(window.__COCKPIT_DATA__){render(window.__COCKPIT_DATA__);return;}
          document.getElementById('dash').innerHTML='<div class="loading">❌ Keine Daten verfügbar</div>';
        });
    });
}

function renderFromState(s){
  // Wandelt state.json in data.json Format um für Dashboard
  var d={
    timestamp: s.market&&s.market._last_run||s.pipeline&&s.pipeline.started||new Date().toISOString(),
    context:{
      VIX: s.macro&&s.macro.vix?{price:s.macro.vix.value,change:s.macro.vix.value-(s.macro.vix.prev||s.macro.vix.value),change_pct:0}:null,
      DXY: s.macro&&s.macro.dxy?{price:s.macro.dxy.value,change:s.macro.dxy.value-(s.macro.dxy.prev||s.macro.dxy.value),change_pct:0}:null,
      US10Y: s.macro&&s.macro.bonds_10y?{price:s.macro.bonds_10y.yield,change:0,change_pct:0}:null
    },
    fred:{
      FEDFUNDS:s.macro&&s.macro.fred&&s.macro.fred.fedfunds?{value:s.macro.fred.fedfunds.value,unit:'%'}:null,
      CPIAUCSL:s.macro&&s.macro.fred&&s.macro.fred.cpi?{value:s.macro.fred.cpi.value,unit:'%'}:null,
      T10Y2Y:{value:0.54,unit:'%'},
      UNRATE:{value:4.3,unit:'%'}
    },
    calendar: s.market&&s.market.calendar||[],
    journal:{
      instruments: Object.keys(s.market&&s.market.instruments||{}).map(function(k){
        var mi=s.market.instruments[k];
        var ai=s.analysis&&s.analysis.instruments&&s.analysis.instruments[k]||{};
        return {
          name:k,
          bias:ai.bias||'—',
          bias_color:ai.bias&&ai.bias.includes('BULL')?'green':ai.bias&&ai.bias.includes('BEAR')?'red':'yellow',
          bias_score:ai.bias_score||0,
          confluence_pct:Math.round((ai.bias_score||0)/7*100),
          confluence_label:(ai.bias_score||0)+'/7',
          quote:{price:mi.current_price,change:0,change_pct:mi.change_pct||0,high:mi.high,low:mi.low,prev_close:mi.prev_close},
          market_profile:{poc:mi.poc,vah:mi.vah,val:mi.val,vwap:mi.vwap,shape:{name:mi.mp_shape||'Normal Day',description:''}},
          current_price:mi.current_price,
          mp_shape_yesterday:mi.mp_shape||'Normal Day'
        };
      })
    }
  };
  render(d);
}
load();
</script>
</body>
</html>
