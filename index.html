<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cockpit-Trader — Morning Briefing</title>
<style>
:root{
  --bg:#0d1117;--card:#161b22;--border:#21262d;
  --text:#e2e8f0;--muted:#8b949e;--dim:#30363d;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;
  --blue:#3b82f6;--cyan:#38bdf8;--magenta:#d946ef;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:clamp(13px,1.1vw,16px)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:1rem;min-height:100vh}

/* ── NAV ─────────────────────────────────────────────────────────── */
nav{position:sticky;top:0;z-index:100;background:rgba(13,17,23,.93);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-weight:800;font-size:13px;letter-spacing:1px;display:flex;align-items:center;gap:6px}
.nav-brand .ico{font-size:15px;opacity:.85}
.nav-brand .name{color:var(--cyan)}
.nav-links{display:flex;gap:2px}
.nav-links a{color:var(--muted);text-decoration:none;padding:5px 10px;font-size:11px;font-weight:600;border-radius:6px;letter-spacing:.5px;transition:all .15s}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,.05)}
.nav-links a.active{color:var(--cyan);background:rgba(56,189,248,.1)}

/* ── HEADER ──────────────────────────────────────────────────────── */
header{text-align:center;padding:22px 16px 18px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(56,189,248,.06) 0%,transparent 100%)}
.h-icon{font-size:26px;margin-bottom:4px;opacity:.7}
.h-title{font-size:20px;font-weight:800;letter-spacing:6px;color:var(--cyan);text-transform:uppercase}
.h-sub{font-size:11px;color:var(--muted);margin-top:5px;letter-spacing:.5px}
.status-line{margin-top:8px;display:inline-flex;align-items:center;gap:6px;font-size:10px;padding:3px 12px;border-radius:20px;background:rgba(255,255,255,.02);border:1px solid var(--border)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.status-dot.stale{background:var(--red);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── MAKRO-BAR ───────────────────────────────────────────────────── */
.makro-bar{display:flex;align-items:stretch;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.m-item{display:flex;flex-direction:column;justify-content:center;padding:8px 16px;border-right:1px solid var(--border);flex-shrink:0;min-width:82px}
.m-label{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.m-val{font-size:15px;font-weight:700;font-family:monospace;margin-top:2px;color:var(--text)}
.m-sub{font-size:8px;color:var(--muted);margin-top:1px}
.m-bias{flex:1;padding:8px 14px;display:flex;flex-direction:column;justify-content:center;min-width:160px}
.m-bias-label{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px}
.m-bias-text{font-size:11px;color:var(--muted);line-height:1.4}

/* ── LAYOUT ──────────────────────────────────────────────────────── */
main{padding:0 0 48px}
.section{padding:20px 16px 0}
.s-title{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.s-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── INSTRUMENT GRID ─────────────────────────────────────────────── */
.instr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:767px){.instr-grid{grid-template-columns:1fr}}
@media(min-width:768px) and (max-width:1199px){.instr-grid{grid-template-columns:1fr 1fr}}

/* ── INSTRUMENT CARD ─────────────────────────────────────────────── */
.icard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;transition:border-color .2s}
.icard:hover{border-color:rgba(56,189,248,.35)}
.ic-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.ic-name{font-size:15px;font-weight:800;letter-spacing:1px}
.ic-date{font-size:9px;color:var(--dim);font-family:monospace}

/* Ampel */
.ampel-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ampel{display:flex;flex-direction:column;gap:4px;background:#000;padding:6px 5px;border-radius:14px;border:1px solid #1a1a1a}
.light{width:14px;height:14px;border-radius:50%;background:#141414}
.lg{background:var(--green);box-shadow:0 0 8px var(--green)}
.ly{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
.lr{background:var(--red);box-shadow:0 0 8px var(--red)}

/* Score */
.score-blk{flex:1}
.score-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.score-val{font-size:26px;font-weight:800;font-family:monospace;line-height:1.1}
.score-bar-bg{height:4px;background:rgba(255,255,255,.06);border-radius:4px;margin-top:5px;overflow:hidden}
.score-bar{height:4px;border-radius:4px}
.score-txt{font-size:9px;color:var(--dim);margin-top:3px}

/* MP Shape tag */
.mp-tag{font-size:11px;color:var(--muted);padding:5px 8px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:6px;margin-bottom:10px;line-height:1.4}
.mp-tag b{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--cyan);display:block;margin-bottom:2px;font-weight:700}

/* Levels */
.lvl-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px}
.lvl{display:flex;flex-direction:column;padding:5px 7px;border-radius:5px;background:rgba(255,255,255,.02)}
.lvl-n{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.lvl-p{font-size:13px;font-weight:700;font-family:monospace;margin-top:1px}
.lvl-poc .lvl-p{color:var(--magenta)}
.lvl-vah .lvl-p,.lvl-val .lvl-p{color:var(--blue)}
.lvl-vwap .lvl-p{color:var(--muted)}

/* Top order */
.top-ord{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:7px;border:1px solid;margin-bottom:10px;font-size:11px}
.top-ord.buy{border-color:rgba(34,197,94,.3);background:rgba(34,197,94,.04)}
.top-ord.sell{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.04)}
.top-ord.none{border-color:var(--border);color:var(--muted)}
.ord-type{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:block}
.top-ord.buy .ord-type{color:var(--green)}
.top-ord.sell .ord-type{color:var(--red)}
.ord-entry{font-family:monospace;font-weight:700;font-size:13px}
.ord-fill{font-size:10px;color:var(--muted);background:rgba(255,255,255,.04);padding:2px 7px;border-radius:10px;white-space:nowrap}

/* Bias signal dots */
.sigs{display:flex;flex-wrap:wrap;gap:5px}
.sig{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:26px}
.sig-dot{width:10px;height:10px;border-radius:50%}
.sig-dot.bull{background:var(--green)}
.sig-dot.bear{background:var(--red)}
.sig-dot.neutral{background:var(--dim);border:1px solid #2a2a2a}
.sig-lbl{font-size:7px;text-transform:uppercase;color:var(--muted);letter-spacing:.3px}

/* ── CHARTS GRID ─────────────────────────────────────────────────── */
.charts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:767px){.charts-grid{grid-template-columns:1fr}}
@media(min-width:768px) and (max-width:1199px){.charts-grid{grid-template-columns:1fr 1fr}}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px}
.chart-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px}
.chart-nodata{font-size:11px;color:var(--dim);padding:40px 0;text-align:center}

/* ── INTERPRETATION ──────────────────────────────────────────────── */
.interp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:767px){.interp-grid{grid-template-columns:1fr}}
@media(min-width:768px) and (max-width:1199px){.interp-grid{grid-template-columns:1fr 1fr}}
.interp-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px}
.interp-badge{display:inline-flex;align-items:center;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:10px;margin-bottom:6px}
.ib-bull{background:rgba(34,197,94,.1);color:var(--green)}
.ib-bear{background:rgba(239,68,68,.1);color:var(--red)}
.ib-neutral{background:rgba(234,179,8,.1);color:var(--yellow)}
.interp-name{font-size:12px;font-weight:700;color:var(--cyan);margin-bottom:5px}
.interp-txt{font-size:11px;color:var(--muted);line-height:1.5}
.interp-fc{font-size:10px;color:var(--dim);margin-top:5px;padding-top:5px;border-top:1px solid var(--border)}

/* ── WARNINGS ────────────────────────────────────────────────────── */
.warn-list{display:flex;flex-direction:column;gap:6px}
.warn-item{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;background:var(--card);border:1px solid var(--border);border-left:3px solid var(--yellow);border-radius:8px;font-size:11px;color:var(--muted);line-height:1.4}
.warn-icon{color:var(--yellow);flex-shrink:0}
.notes-card{margin-top:10px;padding:12px;background:rgba(56,189,248,.04);border:1px solid rgba(56,189,248,.15);border-radius:8px;font-size:11px;color:var(--muted);line-height:1.5}
.notes-card b{color:var(--cyan);display:block;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}

/* ── DESKTOP ≥ 1200px ────────────────────────────────────────────── */
@media(min-width:1200px){
  .section{padding:24px 24px 0}
  /* Nav + Header */
  .nav-brand{font-size:14px}.nav-links a{font-size:12px;padding:6px 12px}
  .h-title{font-size:24px}.h-sub{font-size:12px}.status-line{font-size:11px}
  /* Makro bar */
  .m-item{padding:10px 20px}.m-label{font-size:9px}.m-val{font-size:16px}.m-sub{font-size:9px}
  .m-bias-label{font-size:9px}.m-bias-text{font-size:12px}
  /* Section titles */
  .s-title{font-size:11px;margin-bottom:14px}
  /* Instrument cards */
  .icard{padding:18px}
  .ic-name{font-size:17px}
  .score-lbl{font-size:10px}
  .score-val{font-size:30px}
  .score-txt{font-size:10px}
  .mp-tag{font-size:12px;padding:7px 10px}.mp-tag b{font-size:10px}
  .lvl-n{font-size:9px}.lvl-p{font-size:15px}
  .top-ord{padding:9px 11px;font-size:12px}.ord-type{font-size:10px}.ord-entry{font-size:15px}.ord-fill{font-size:11px}
  .sig-dot{width:12px;height:12px}.sig-lbl{font-size:8px}
  /* Charts */
  .chart-card{padding:16px}.chart-title{font-size:11px}
  /* Interpretation */
  .interp-item{padding:14px}
  .interp-badge{font-size:10px;padding:3px 10px}
  .interp-name{font-size:13px}.interp-txt{font-size:12px}.interp-fc{font-size:11px}
  /* Warnings */
  .warn-item{font-size:12px;padding:10px 14px}
  .notes-card{font-size:12px;padding:14px}.notes-card b{font-size:10px}
}
</style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <span class="ico">✈</span>
    <span>COCKPIT-<span class="name">TRADER</span></span>
  </div>
  <div class="nav-links">
    <a href="index.html" class="active">Dashboard</a>
    <a href="journal.html">Journal</a>
    <a href="orders.html">Orders</a>
  </div>
</nav>

<header>
  <div class="h-icon">✈</div>
  <div class="h-title">Cockpit-Trader</div>
  <div class="h-sub">Pre-Flight Briefing — <span id="ts-display">–</span></div>
  <div class="status-line">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">Lade Daten…</span>
  </div>
</header>

<div class="makro-bar">
  <div class="m-item"><div class="m-label">VIX</div><div class="m-val" id="m-vix">—</div><div class="m-sub" id="m-vix-s">Volatilität</div></div>
  <div class="m-item"><div class="m-label">DXY</div><div class="m-val" id="m-dxy">—</div><div class="m-sub">Dollar Index</div></div>
  <div class="m-item"><div class="m-label">US10Y</div><div class="m-val" id="m-tnx">—</div><div class="m-sub">Treasury Yield</div></div>
  <div class="m-bias"><div class="m-bias-label">Makro-Bias</div><div class="m-bias-text" id="m-bias-txt">–</div></div>
</div>

<main>
  <div class="section">
    <div class="s-title">Instrumente</div>
    <div class="instr-grid" id="instr-grid"></div>
  </div>

  <div class="section" style="margin-top:24px">
    <div class="s-title">Market Profile — Level Chart</div>
    <div class="charts-grid" id="charts-grid"></div>
  </div>

  <div class="section" style="margin-top:24px">
    <div class="s-title">Tages-Interpretation</div>
    <div class="interp-grid" id="interp-grid"></div>
  </div>

  <div class="section" style="margin-top:24px">
    <div class="s-title">Warnungen & Kalender</div>
    <div id="warnings-section"></div>
  </div>
</main>

<script>
const SIG_KEYS   = ['mp','vp','vwap','smc','ich','sr','ew','sma','piv'];
const SIG_LABELS = {mp:'MP',vp:'VP',vwap:'VWAP',smc:'SMC',ich:'ICH',sr:'S/R',ew:'EW',sma:'SMA',piv:'PIV'};

function biasClass(b) {
  if (!b) return 'neutral';
  const s = b.toLowerCase();
  if (s.includes('bull')) return 'bull';
  if (s.includes('bear') || s.includes('bär')) return 'bear';
  return 'neutral';
}
function biasLabel(b) { const c = biasClass(b); return c === 'bull' ? 'BULL' : c === 'bear' ? 'BEAR' : 'NEUT'; }
function biasColor(c) { return c === 'bull' ? 'var(--green)' : c === 'bear' ? 'var(--red)' : 'var(--yellow)'; }

function fmtP(p) {
  if (p === null || p === undefined || isNaN(p)) return '—';
  return p > 999 ? Math.round(p).toString() : p > 99 ? Math.round(p).toString() : p.toFixed(2);
}

function getTopOrder(instr) {
  if (instr.top_order) return instr.top_order;
  const orders = instr.orders || [];
  if (!orders.length) return null;
  return [...orders].sort((a, b) => parseFloat(b.p_fill || 0) - parseFloat(a.p_fill || 0))[0];
}

function parseMp(txt) {
  if (!txt) return null;
  const poc = txt.match(/POC\s*([\d.]+)/i);
  const vah = txt.match(/VAH\s*([\d.]+)/i);
  const val = txt.match(/VAL\s*([\d.]+)/i);
  if (!poc || !vah || !val) return null;
  return { poc: parseFloat(poc[1]), vah: parseFloat(vah[1]), val: parseFloat(val[1]) };
}

function inferSignals(instr) {
  if (instr.bias_signals) return instr.bias_signals;
  const txt = [instr.daily_summary, instr.h4_summary, instr.h1_summary, instr.h30m_summary]
    .filter(Boolean).join(' ').toLowerCase();
  const rules = {
    mp:   [['b-shape','open drive','breakout','initiative buy'],   ['p-shape','trend day (down)']],
    vp:   [['bull ob','hvn buy','vp poc'],                         ['hvn sell','bear ob']],
    vwap: [['+1','+2'],                                             ['−1','−2','-1.','-2.']],
    smc:  [['bos bullisch','bullisch choch','bull ob','bullisch'],  ['bear ob','bärisch']],
    ich:  [['strong_bullish','ichimoku d bullish'],                 ['strong_bearish','bearish']],
    sr:   [['support hält','sr bull'],                             ['widerstand hält','sr bär']],
    ew:   [['c up','(3)','(1) up'],                                 ['(5) komplett','(4)']],
    sma:  [['über sma200','über 200'],                              ['unter sma200','unter 200']],
    piv:  [['pivot r','über pivot'],                               ['unter pivot','pivot s']],
  };
  const result = {};
  SIG_KEYS.forEach(k => {
    const [bulls, bears] = rules[k] || [[], []];
    result[k] = bulls.some(kw => txt.includes(kw)) ? 'bull'
              : bears.some(kw => txt.includes(kw)) ? 'bear' : 'neutral';
  });
  return result;
}

function buildLevelSVG(instr) {
  const mp = parseMp(instr.mp_shape_yesterday);
  if (!mp) return '<div class="chart-nodata">Keine MP-Daten verfügbar</div>';

  const { poc, vah, val } = mp;
  const range = vah - val;
  const pad   = range * 0.55;
  const pMin  = val - pad, pMax = vah + pad, pRange = pMax - pMin;
  const W = 260, H = 200, barMaxW = 118, labelX = W - 70;
  const pToY = p => H * (1 - (p - pMin) / pRange);

  // Gaussian volume simulation centred on POC
  const nBars = 36, step = pRange / nBars;
  let bars = '';
  for (let i = 0; i < nBars; i++) {
    const price = pMin + (i + 0.5) * step;
    const y     = pToY(price);
    const bH    = Math.max(1.5, H / nBars - 0.5);
    const dist  = Math.abs(price - poc) / (range * 0.38);
    const bW    = barMaxW * Math.exp(-dist * dist * 1.9);
    const nearPOC = Math.abs(price - poc) < step * 1.5;
    const inVA    = price >= val && price <= vah;
    const fill = nearPOC ? 'rgba(217,70,239,.88)' : inVA ? 'rgba(59,130,246,.55)' : 'rgba(100,116,139,.18)';
    bars += `<rect x="0" y="${(y - bH / 2).toFixed(1)}" width="${bW.toFixed(1)}" height="${bH.toFixed(1)}" fill="${fill}" rx="1"/>`;
  }

  const vahY = pToY(vah), valY = pToY(val), pocY = pToY(poc);

  // Entry line
  const ord = getTopOrder(instr);
  let entryLine = '';
  if (ord) {
    const ep = parseFloat(ord.entry);
    if (!isNaN(ep) && ep >= pMin && ep <= pMax) {
      const ey  = pToY(ep);
      const col = ord.type.toLowerCase().includes('buy') ? 'rgba(34,197,94,.8)' : 'rgba(239,68,68,.8)';
      entryLine = `
        <line x1="0" y1="${ey.toFixed(1)}" x2="${labelX - 2}" y2="${ey.toFixed(1)}" stroke="${col}" stroke-width=".8" stroke-dasharray="3,3"/>
        <text x="${labelX}" y="${(ey + 3).toFixed(1)}" fill="${col}" font-size="8" font-family="monospace">${fmtP(ep)}</text>`;
    }
  }

  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;border-radius:4px">
    ${bars}
    <line x1="0" y1="${vahY.toFixed(1)}" x2="${labelX - 2}" y2="${vahY.toFixed(1)}" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="${labelX}" y="${(vahY + 3).toFixed(1)}" fill="#3b82f6" font-size="9" font-family="monospace" font-weight="600">VAH ${fmtP(vah)}</text>
    <line x1="0" y1="${pocY.toFixed(1)}" x2="${labelX - 2}" y2="${pocY.toFixed(1)}" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="5,2"/>
    <text x="${labelX}" y="${(pocY + 3).toFixed(1)}" fill="#d946ef" font-size="9" font-family="monospace" font-weight="600">POC ${fmtP(poc)}</text>
    <line x1="0" y1="${valY.toFixed(1)}" x2="${labelX - 2}" y2="${valY.toFixed(1)}" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="${labelX}" y="${(valY + 3).toFixed(1)}" fill="#3b82f6" font-size="9" font-family="monospace" font-weight="600">VAL ${fmtP(val)}</text>
    ${entryLine}
  </svg>`;
}

function renderHeader(d) {
  const ts      = new Date(d.timestamp);
  const ageH    = (Date.now() - ts) / 3600000;
  const dateStr = ts.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'});
  const timeStr = ts.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('ts-display').textContent = `${dateStr} ${timeStr}`;
  const dot = document.getElementById('status-dot');
  const stxt = document.getElementById('status-text');
  if (ageH > 4) {
    dot.classList.add('stale');
    stxt.textContent = `VERALTET — ${Math.round(ageH)}h alt`;
    stxt.style.color = 'var(--red)';
  } else {
    const m = Math.round(ageH * 60);
    stxt.textContent = `OK — ${timeStr} (${m < 1 ? 'gerade eben' : m + 'min'})`;
    stxt.style.color = 'var(--green)';
  }
}

function renderMakroBar(d) {
  const notes = d.summary?.notes || '';
  document.getElementById('m-bias-txt').textContent =
    notes.length > 130 ? notes.slice(0, 130) + '…' : notes || '–';
}

function renderInstruments(d) {
  document.getElementById('instr-grid').innerHTML = (d.instruments || []).map(instr => {
    const bc     = biasClass(instr.bias);
    const bColor = biasColor(bc);
    const score  = parseInt(instr.bias_pct) || 50;
    const mp     = parseMp(instr.mp_shape_yesterday);
    const topOrd = getTopOrder(instr);
    const sigs   = inferSignals(instr);

    const mpShape = (instr.mp_shape_yesterday || '—').replace(/\s*\([^)]*\)/g, '').trim();

    let ordHtml = `<div class="top-ord none"><span>Kein Entry-Setup</span></div>`;
    if (topOrd) {
      const isBuy = topOrd.type.toLowerCase().includes('buy');
      ordHtml = `
        <div class="top-ord ${isBuy ? 'buy' : 'sell'}">
          <div>
            <span class="ord-type">${topOrd.type}</span>
            <span class="ord-entry">${topOrd.entry}</span>
          </div>
          <span class="ord-fill">Fill ${topOrd.p_fill}%</span>
        </div>`;
    }

    const sigDots = SIG_KEYS.map(k => {
      const s = (sigs[k] || 'neutral').toLowerCase();
      const c = s.includes('bull') ? 'bull' : s.includes('bear') ? 'bear' : 'neutral';
      return `<div class="sig"><div class="sig-dot ${c}"></div><div class="sig-lbl">${SIG_LABELS[k]}</div></div>`;
    }).join('');

    return `
      <div class="icard">
        <div class="ic-head">
          <span class="ic-name">${instr.name}</span>
          <span class="ic-date">${d.date || ''}</span>
        </div>
        <div class="ampel-row">
          <div class="ampel">
            <div class="light ${bc === 'bull'    ? 'lg' : ''}"></div>
            <div class="light ${bc === 'neutral' ? 'ly' : ''}"></div>
            <div class="light ${bc === 'bear'    ? 'lr' : ''}"></div>
          </div>
          <div class="score-blk">
            <div class="score-lbl">${biasLabel(instr.bias)}</div>
            <div class="score-val" style="color:${bColor}">${score}%</div>
            <div class="score-bar-bg"><div class="score-bar" style="width:${score}%;background:${bColor}"></div></div>
            <div class="score-txt">Konfidenz</div>
          </div>
        </div>
        <div class="mp-tag"><b>MP Shape</b>${mpShape}</div>
        <div class="lvl-grid">
          <div class="lvl lvl-poc"><span class="lvl-n">POC</span><span class="lvl-p">${mp ? fmtP(mp.poc) : '—'}</span></div>
          <div class="lvl lvl-vah"><span class="lvl-n">VAH</span><span class="lvl-p">${mp ? fmtP(mp.vah) : '—'}</span></div>
          <div class="lvl lvl-val"><span class="lvl-n">VAL</span><span class="lvl-p">${mp ? fmtP(mp.val) : '—'}</span></div>
          <div class="lvl lvl-vwap"><span class="lvl-n">VWAP</span><span class="lvl-p">—</span></div>
        </div>
        ${ordHtml}
        <div class="sigs">${sigDots}</div>
      </div>`;
  }).join('');
}

function renderCharts(d) {
  document.getElementById('charts-grid').innerHTML = (d.instruments || []).map(instr => `
    <div class="chart-card">
      <div class="chart-title">${instr.name} — Market Profile Vortag</div>
      ${buildLevelSVG(instr)}
    </div>`).join('');
}

function renderInterpretation(d) {
  document.getElementById('interp-grid').innerHTML = (d.instruments || []).map(instr => {
    const bc   = biasClass(instr.bias);
    const text = instr.interpretation || instr.mp_shape_forecast || instr.h30m_summary || '—';
    const fc   = instr.mp_shape_forecast || '';
    return `
      <div class="interp-item">
        <div class="interp-badge ib-${bc}">${biasLabel(instr.bias)}</div>
        <div class="interp-name">${instr.name}</div>
        <div class="interp-txt">${text}</div>
        ${fc && fc !== text ? `<div class="interp-fc">Prognose: ${fc}</div>` : ''}
      </div>`;
  }).join('');
}

function renderWarnings(d) {
  const sec  = document.getElementById('warnings-section');
  const ws   = d.summary?.warnings || [];
  let html   = '';
  if (ws.length) {
    html += '<div class="warn-list">' +
      ws.map(w => `<div class="warn-item"><span class="warn-icon">⚠</span><span>${w}</span></div>`).join('') +
      '</div>';
  }
  if (d.summary?.notes) {
    html += `<div class="notes-card"><b>Captain Notes</b>${d.summary.notes}</div>`;
  }
  sec.innerHTML = html || '<div style="color:var(--dim);font-size:11px;padding:12px 0">Keine Warnungen</div>';
}

async function loadDashboard() {
  try {
    const res = await fetch('journal-data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();
    renderHeader(d);
    renderMakroBar(d);
    renderInstruments(d);
    renderCharts(d);
    renderInterpretation(d);
    renderWarnings(d);
  } catch (err) {
    document.getElementById('status-text').textContent = 'Fehler: ' + err.message;
    document.getElementById('status-dot').classList.add('stale');
    document.getElementById('instr-grid').innerHTML =
      `<div style="color:var(--muted);font-size:12px;padding:20px 0;grid-column:1/-1">
        Keine Daten — journal-data.json nicht erreichbar.<br>Morning Analyse starten um Daten zu generieren.
      </div>`;
  }
}

loadDashboard();
</script>
</body>
</html>
